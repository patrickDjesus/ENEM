<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENEM - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/home.css">
</head>

<body>

  <div id="sidebarRoot"></div>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1 id="greeting">Bom dia, Patrick</h1>
        <p>Vamos continuar seus estudos?</p>
      </div>
      <div class="topbar-right">
        <div class="search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" placeholder="Buscar conteudo..." id="searchInput">
        </div>
      </div>
    </header>

    <section class="stats">
      <div class="stat-card">
        <div class="stat-icon icon-docs">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14,2 14,8 20,8" />
          </svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="statDocs">0</span>
          <span class="stat-label">Documentos</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon icon-vids">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="23,7 16,12 23,17" />
            <rect x="1" y="5" width="15" height="14" rx="2" />
          </svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="statVids">0</span>
          <span class="stat-label">Videos</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon icon-notes">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9" />
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
          </svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="statNotes">0</span>
          <span class="stat-label">Anontacoes</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon icon-quizzes">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
            <line x1="12" y1="17" x2="12.01" y2="17" />
          </svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="statQuizzes">0</span>
          <span class="stat-label">Quizzes</span>
        </div>
      </div>
    </section>

    <div class="content-grid">
      <section class="content-section">
        <div class="section-header">
          <h2>Conteudo Recente</h2>
          <a href="#" class="see-all">Ver tudo</a>
        </div>
        <div id="recentContent" class="cards"></div>
        <div id="emptyState" class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14,2 14,8 20,8" />
          </svg>
          <p>Nenhum conteudo adicionado ainda.</p>
          <p>Comece adicionando documentos ou videos!</p>
        </div>
      </section>

      <section class="content-section">
        <div class="section-header">
          <h2>Por Materia</h2>
        </div>
        <div id="subjectBreakdown" class="subject-breakdown"></div>
      </section>
    </div>

    <section class="content-section">
      <div class="section-header">
        <h2>Quizzes</h2>
        <a href="quizzes.html" class="see-all">Ver tudo</a>
      </div>
      <div id="homeQuizzes" class="quiz-grid"></div>
      <div id="emptyQuizzes" class="empty-state" style="display:none;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
        <p>Nenhum quiz criado ainda.</p>
      </div>
    </section>

    <section class="content-section ranking-section" id="rankingSection">
      <div class="section-header">
        <h2>Ranking</h2>
      </div>
      <div class="ranking-tabs">
        <button class="ranking-tab active" data-tab="all">Global</button>
        <button class="ranking-tab" data-tab="week">Semanal</button>
      </div>
      <div class="ranking-list"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/database.js"></script>
  <script src="js/shared.js"></script>
  <script>
    (async function () {
      const root = document.getElementById('sidebarRoot');
      root.insertAdjacentHTML('afterbegin', renderSidebar('home'));
      initSidebar();
      initThemeToggle();
      initEmojiPickers();
      const currentUser = getCurrentUser();
      const userName = currentUser ? currentUser.name : 'Estudante';
      const hour = new Date().getHours();
      const greeting = hour < 12 ? 'Bom dia' : hour < 18 ? 'Boa tarde' : 'Boa noite';
      document.getElementById('greeting').textContent = greeting + ', ' + userName.split(' ')[0];

      const docs = await getDocuments();
      const vids = await getVideos();
      const quizzes = await getQuizzes();
      let totalNotes = 0;
      vids.forEach(v => totalNotes += (v.notes || []).length);

      document.getElementById('statDocs').textContent = docs.length;
      document.getElementById('statVids').textContent = vids.length;
      document.getElementById('statNotes').textContent = totalNotes;
      document.getElementById('statQuizzes').textContent = quizzes.length;

      // Recent content
      const all = [
        ...docs.map(d => ({ ...d, _type: 'doc' })),
        ...vids.map(v => ({ ...v, _type: 'video' }))
      ].sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 5);

      const rc = document.getElementById('recentContent');
      const es = document.getElementById('emptyState');
      if (all.length === 0) {
        es.style.display = 'flex';
      } else {
        all.forEach(item => {
          const s = SUBJECTS[item.subject];
          const pinned = isPinned(item._type, item.id);
          const timeEst = estimateTime(item._type, item);
          const card = document.createElement('div');
          card.className = 'card ripple-container';
          card.dataset.searchText = (item.title + ' ' + (item.description || '') + ' ' + (s ? s.name : '')).toLowerCase();
          card.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div class="card-badge">${item._type === 'doc' ? 'PDF' : 'Video'}</div>
              <button class="pin-btn ${pinned ? 'pinned' : ''}" data-pin-type="${item._type}" data-pin-id="${item.id}" title="Fixar">${pinned ? '\u{1F4CC}' : '\u{1F4CE}'}</button>
            </div>
            <h3>${item.title}</h3>
            <p>${item.description || (s ? s.name : '')}</p>
            <div class="time-estimate">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
              ~${timeEst} min
            </div>
          `;
          rc.appendChild(card);
        });
      }

      // Subject breakdown
      const sb = document.getElementById('subjectBreakdown');
      const counts = {};
      docs.forEach(d => { counts[d.subject] = (counts[d.subject] || 0) + 1; });
      vids.forEach(v => { counts[v.subject] = (counts[v.subject] || 0) + 1; });
      const maxCount = Math.max(1, ...Object.values(counts));
      Object.keys(SUBJECTS).forEach(key => {
        const s = SUBJECTS[key];
        const count = counts[key] || 0;
        const pct = Math.round((count / maxCount) * 100);
        const el = document.createElement('div');
        el.className = 'subject-row';
        el.innerHTML = `
          <div class="subject-dot"></div>
          <span class="subject-name">${s.name}</span>
          <div class="subject-bar"><div class="subject-bar-fill"></div></div>
          <span class="subject-count">${count}</span>
        `;
        el.addEventListener('mouseenter', () => {
          el.querySelector('.subject-dot').style.background = s.color;
          el.querySelector('.subject-bar-fill').style.background = s.color;
          el.querySelector('.subject-bar-fill').style.width = pct + '%';
        });
        el.addEventListener('mouseleave', () => {
          el.querySelector('.subject-dot').style.background = '';
          el.querySelector('.subject-bar-fill').style.background = '';
          el.querySelector('.subject-bar-fill').style.width = '0%';
        });
        sb.appendChild(el);
      });

      // Quizzes
      const qg = document.getElementById('homeQuizzes');
      const eq = document.getElementById('emptyQuizzes');
      const topQuizzes = quizzes.slice(0, 3);
      if (topQuizzes.length === 0) {
        eq.style.display = 'flex';
      } else {
        topQuizzes.forEach(q => {
          const s = SUBJECTS[q.subject];
          const card = document.createElement('div');
          card.className = 'quiz-card ripple-container';
          card.innerHTML = `
            <div class="quiz-info">
              <span class="quiz-subject">${s ? s.name : 'Geral'}</span>
              <h3>${q.title}</h3>
              <p>${q.questions.length} questoes</p>
            </div>
            <div class="quiz-action">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16"/></svg>
            </div>
          `;
          qg.appendChild(card);
        });
      }

      // Search with highlight
      document.getElementById('searchInput').addEventListener('input', function () {
        const q = this.value.toLowerCase().trim();
        const cards = rc.querySelectorAll('.card');
        cards.forEach(c => {
          c.classList.remove('search-highlight', 'search-dimmed');
          if (q && c.dataset.searchText && c.dataset.searchText.includes(q)) {
            c.classList.add('search-highlight');
          } else if (q) {
            c.classList.add('search-dimmed');
          }
        });
      });

      // Pin buttons
      rc.addEventListener('click', async function(e) {
        const pinBtn = e.target.closest('.pin-btn');
        if (pinBtn) {
          e.stopPropagation();
          const type = pinBtn.dataset.pinType;
          const id = parseInt(pinBtn.dataset.pinId);
          const nowPinned = togglePin(type, id);
          pinBtn.classList.toggle('pinned', nowPinned);
          pinBtn.textContent = nowPinned ? '\u{1F4CC}' : '\u{1F4CE}';
        }
      });

      // Ranking section
      const rankSection = document.getElementById('rankingSection');
      if (rankSection) {
        let rankTab = 'all';
        async function renderRanking(tab) {
          rankTab = tab;
          const ranking = tab === 'week' ? await getWeeklyRanking() : await getRanking();
          const list = rankSection.querySelector('.ranking-list');
          list.innerHTML = '';
          if (ranking.length === 0) {
            list.innerHTML = '<p style="text-align:center;color:var(--text-dim);font-size:13px;padding:20px;">Nenhum resultado ainda</p>';
            return;
          }
          ranking.forEach((r, i) => {
            const el = document.createElement('div');
            el.className = 'ranking-item';
            el.innerHTML = `
              <div class="ranking-pos">${i + 1}</div>
              <span class="ranking-name">${r.user_name}</span>
              <span class="ranking-quizzes">${r.total_quizzes} quiz${r.total_quizzes > 1 ? 'zes' : ''}</span>
              <span class="ranking-score">${r.avg_pct}%</span>
            `;
            list.appendChild(el);
          });
        }
        rankSection.querySelectorAll('.ranking-tab').forEach(tab => {
          tab.addEventListener('click', () => {
            rankSection.querySelectorAll('.ranking-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            renderRanking(tab.dataset.tab);
          });
        });
        renderRanking('all');
      }
    })();
  </script>
</body>

</html>
