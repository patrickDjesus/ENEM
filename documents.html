  <link rel="stylesheet" href="documents.css">
</head>

        Inicio

      <a href="documents.html" class="nav-item active">

    <div class="sidebar-footer">
      <button class="theme-toggle" id="themeToggle">
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <span>Tema</span>

      </button>
      <div class="user">
        <div class="avatar">P</div>
        <div class="user-info">
          <span class="user-name">Patrick</span>
          <span class="user-role">Estudante</span>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Documentos</h1>
        <p>Organize seus materiais de estudo em PDF</p>
      </div>
      <button class="btn-primary" id="btnAdd">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Adicionar Documento
      </button>
    </header>

    <div class="filters" id="filters"></div>

    <div id="docList" class="doc-list"></div>
    <div id="emptyState" class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
      <p>Nenhum documento adicionado.</p>
      <p>Clique em "Adicionar Documento" para comecar.</p>
    </div>
  </main>

  <!-- MODAL ADICIONAR -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Adicionar Documento</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form id="docForm">
        <div class="form-group">
          <label for="docTitle">Titulo *</label>
          <input type="text" id="docTitle" placeholder="Ex: Funcoes do 2o grau" required>
        </div>
        <div class="form-group">
          <label for="docSubject">Materia *</label>
          <select id="docSubject" required>
            <option value="">Selecione a materia</option>
          </select>
        </div>
        <div class="form-group">
          <label for="docDesc">Descricao</label>
          <div class="textarea-wrapper">
            <textarea id="docDesc" rows="3" placeholder="Breve descricao do conteudo..."></textarea>
            <button class="emoji-btn" data-emoji-target="docDesc" title="Inserir emoji">&#128578;</button>
          </div>
        </div>
        <div class="form-group">
          <label for="docFile">Arquivo PDF *</label>
          <div class="file-input" id="fileInput">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span id="fileLabel">Clique para selecionar o PDF</span>
            <input type="file" id="docFile" accept=".pdf" hidden required>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="btnSubmit">
          <span id="btnSubmitText">Salvar Documento</span>
        </button>
      </form>
    </div>
  </div>

  <!-- PDF VIEWER INLINE -->
  <div id="pdfViewer" class="pdf-viewer">
    <div class="pdf-toolbar">
      <button class="btn-back" id="pdfBack">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
        Voltar
      </button>
      <div class="pdf-info">
        <h3 id="pdfTitle"></h3>
        <span id="pdfSubject"></span>
      </div>
      <button class="btn-external" id="btnOpenExternal">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Abrir em nova aba
      </button>
    </div>
    <iframe id="pdfFrame" class="pdf-frame"></iframe>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" async></script>
  <script src="database.js"></script>
  <script>
    (async function() {
      const select = document.getElementById('docSubject');
      Object.keys(SUBJECTS).forEach(k => {
        const o = document.createElement('option');
        o.value = k;
        o.textContent = SUBJECTS[k].name;
        select.appendChild(o);
      });

      let activeFilter = null;

      async function renderDocs(filter) {
        activeFilter = filter || null;
        const allDocs = await getDocuments();
        const docs = allDocs.filter(d => !activeFilter || d.subject === activeFilter);
        const list = document.getElementById('docList');
        const empty = document.getElementById('emptyState');
        list.innerHTML = '';
        if (docs.length === 0) {
          empty.style.display = 'flex';
        } else {
          empty.style.display = 'none';
          docs.forEach(doc => {
            const s = SUBJECTS[doc.subject];
            const el = document.createElement('div');
            el.className = 'doc-card';
            el.style.setProperty('--subject-color', s ? s.color : '#666');
            el.innerHTML = `
              <div class="doc-left">
                <div class="doc-icon">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
                </div>
                <div class="doc-info">
                  <h3>${doc.title}</h3>
                  <div class="doc-meta">
                    <span class="doc-subject" style="background:${s ? s.colorLight : '#1e1e1e'};color:${s ? s.color : '#666'}">${s ? s.name : 'Geral'}</span>
                    <span class="doc-date">${formatDate(doc.created_at)}</span>
                  </div>
                  ${doc.description ? `<p class="doc-desc">${doc.description}</p>` : ''}
                </div>
              </div>
              <div class="doc-actions">
                <button class="btn-icon btn-view" title="Visualizar">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
                <button class="btn-icon btn-delete" title="Remover">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
              </div>
            `;
            el.querySelector('.btn-view').addEventListener('click', () => viewDoc(doc));
            el.querySelector('.btn-delete').addEventListener('click', async () => {
              if (confirm('Remover "' + doc.title + '"?')) {
                await removeDocument(doc.id);
                await renderDocs(activeFilter);
                await renderFilters();
              }
            });
            list.appendChild(el);
          });
        }
      }

      async function renderFilters() {
        const filters = document.getElementById('filters');
        const allDocs = await getDocuments();
        const subjects = [...new Set(allDocs.map(d => d.subject))];
        filters.innerHTML = '';
        const allBtn = document.createElement('button');
        allBtn.className = 'filter-btn' + (!activeFilter ? ' active' : '');
        allBtn.textContent = 'Todos';
        allBtn.addEventListener('click', async () => { activeFilter = null; await renderDocs(null); await renderFilters(); });
        filters.appendChild(allBtn);
        subjects.forEach(sk => {
          const s = SUBJECTS[sk];
          const btn = document.createElement('button');
          btn.className = 'filter-btn' + (activeFilter === sk ? ' active' : '');
          btn.textContent = s ? s.name : sk;
          if (s) btn.style.setProperty('--f-color', s.color);
          btn.addEventListener('click', async () => { activeFilter = sk; await renderDocs(sk); await renderFilters(); });
          filters.appendChild(btn);
        });
      }

      function viewDoc(doc) {
        const s = SUBJECTS[doc.subject];
        document.getElementById('pdfTitle').textContent = doc.title;
        const sub = document.getElementById('pdfSubject');
        sub.textContent = s ? s.name : 'Geral';
        sub.style.color = s ? s.color : '#666';
        document.getElementById('pdfFrame').src = doc.file_url || doc.file_data || doc.fileUrl || doc.fileData || '';
        document.querySelector('.main').classList.add('hidden');
        document.getElementById('pdfViewer').classList.add('active');
      }

      // PDF Viewer close
      document.getElementById('pdfBack').addEventListener('click', closePdfViewer);
      function closePdfViewer() {
        document.getElementById('pdfViewer').classList.remove('active');
        document.querySelector('.main').classList.remove('hidden');
        document.getElementById('pdfFrame').src = '';
      }

      document.getElementById('btnOpenExternal').addEventListener('click', () => {
        const src = document.getElementById('pdfFrame').src;
        if (src) window.open(src, '_blank');
      });

      // Add modal
      const overlay = document.getElementById('modalOverlay');
      document.getElementById('btnAdd').addEventListener('click', () => overlay.classList.add('show'));
      document.getElementById('modalClose').addEventListener('click', () => overlay.classList.remove('show'));
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('show'); });

      // File input
      const fileInput = document.getElementById('docFile');
      const fileInputBox = document.getElementById('fileInput');
      fileInputBox.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', () => {
        if (fileInput.files.length) {
          document.getElementById('fileLabel').textContent = fileInput.files[0].name;
        }
      });

      // Submit
      document.getElementById('docForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const file = fileInput.files[0];
        if (!file) return;

        const MAX_SIZE = 4 * 1024 * 1024;
        if (file.size > MAX_SIZE && !supabase) {
          alert('Arquivo muito grande para armazenamento local (max 4MB). O Supabase esta indisponivel.');
          return;
        }

        const btnSubmit = document.getElementById('btnSubmit');
        const btnText = document.getElementById('btnSubmitText');
        btnSubmit.disabled = true;
        btnText.textContent = 'Enviando...';

        try {
          let file_url = '';
          let file_path = '';

          if (supabase) {
            file_path = `pdfs/${Date.now()}_${file.name}`;
            const { data, error } = await supabase.storage
              .from(BUCKET)
              .upload(file_path, file, { contentType: 'application/pdf' });

            if (error) throw error;

            const { data: urlData } = supabase.storage
              .from(BUCKET)
              .getPublicUrl(file_path);

            file_url = urlData.publicUrl;
          } else {
            file_url = await new Promise((resolve) => {
              const reader = new FileReader();
              reader.onload = () => resolve(reader.result);
              reader.readAsDataURL(file);
            });
          }

          await addDocument({
            title: document.getElementById('docTitle').value,
            subject: document.getElementById('docSubject').value,
            description: document.getElementById('docDesc').value,
            file_name: file.name,
            file_size: (file.size / 1024 / 1024).toFixed(2) + ' MB',
            file_url: file_url,
            file_path: file_path
          });

          overlay.classList.remove('show');
          this.reset();
          document.getElementById('fileLabel').textContent = 'Clique para selecionar o PDF';
          await renderDocs(activeFilter);
          await renderFilters();
        } catch(err) {
          console.error('Upload error:', err);
          alert('Erro ao enviar arquivo: ' + err.message);
        } finally {
          btnSubmit.disabled = false;
          btnText.textContent = 'Salvar Documento';
        }
      });

      await renderDocs(null);
      await renderFilters();
    })();
  </script>
  <script src="shared.js"></script>
</body>
