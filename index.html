<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENEM - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>

  <!-- LADO ESQUERDO -->
  <div class="left-panel">
    <div class="dots-pattern"></div>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>

    <div class="brand">
      <div class="brand-logo">ENEM</div>
      <div class="brand-sub">Plataforma de Estudos</div>
      <p class="brand-desc">Prepare-se para o Exame Nacional do Ensino Médio com simulados, questões e acompanhamento do seu desempenho.</p>
    </div>
  </div>

  <!-- LADO DIREITO -->
  <div class="right-panel">
    <div class="glow glow-purple"></div>
    <div class="glow glow-pink"></div>

    <div class="form-header">
      <h2>Bem-vindo de volta</h2>
      <p>Entre com sua conta para continuar estudando</p>
    </div>

    <form id="loginForm" onsubmit="return false;">
      <div class="form-group">
        <label for="email">E-mail</label>
        <div class="input-wrapper">
          <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input type="email" id="email" placeholder="seu@email.com" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="input-wrapper">
          <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" placeholder="Digite sua senha" required>
        </div>
      </div>

      <div class="form-options">
        <label class="remember">
          <input type="checkbox">
          Lembrar de mim
        </label>
        <a href="#" class="forgot">Esqueceu a senha?</a>
      </div>

      <div class="login-error" id="loginError" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span id="loginErrorText">E-mail ou senha invalidos</span>
      </div>

      <button type="submit" class="btn-login">
        <span>Entrar</span>
      </button>
    </form>

    <div class="login-footer">
      <p>Credenciais padrao: <strong>admin@enem.com</strong> / <strong>admin123</strong></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/database.js"></script>
  <script>
    (function() {
      const user = getCurrentUser();
      if (user) {
        window.location.href = 'home.html';
        return;
      }

      const form = document.getElementById('loginForm');
      const errorEl = document.getElementById('loginError');
      const errorText = document.getElementById('loginErrorText');
      const btnLogin = document.querySelector('.btn-login');

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
          errorText.textContent = 'Preencha todos os campos';
          errorEl.style.display = 'flex';
          return;
        }

        btnLogin.disabled = true;
        btnLogin.querySelector('span').textContent = 'Entrando...';

        try {
          const user = await authenticateUser(email, password);
          if (user) {
            setCurrentUser(user);
            window.location.href = 'home.html';
          } else {
            errorText.textContent = 'E-mail ou senha invalidos';
            errorEl.style.display = 'flex';
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
          }
        } catch(err) {
          errorText.textContent = 'Erro ao conectar. Tente novamente.';
          errorEl.style.display = 'flex';
        } finally {
          btnLogin.disabled = false;
          btnLogin.querySelector('span').textContent = 'Entrar';
        }
      });
    })();
  </script>

</body>
</html>
