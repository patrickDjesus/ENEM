<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENEM - Videos</title>
  <link rel="icon" href="img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/videos.css">
</head>
<body>

  <div id="sidebarRoot"></div>

  <main class="main">
    <!-- LIST VIEW -->
    <div id="listView">
      <header class="topbar">
        <div class="topbar-left">
          <h1>Videos</h1>
          <p>Assista aulas e faca anotacoes diretamente aqui</p>
        </div>
        <div class="topbar-right">
          <div class="search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Buscar videos..." id="searchInput">
          </div>
          <button class="btn-primary" id="btnAdd">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Adicionar Video
          </button>
        </div>
      </header>
      <div class="filters" id="filters"></div>
      <div id="videoList" class="video-list"></div>
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><polygon points="23,7 16,12 23,17"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        </div>
        <p>Nenhum video adicionado.</p>
        <p>Clique em "Adicionar Video" para colar um link do YouTube.</p>
      </div>
    </div>

    <!-- WATCH VIEW -->
    <div id="watchView" class="watch-view hidden">
      <div class="watch-topbar">
        <button class="btn-back-watch" id="btnBack">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Voltar
        </button>
        <div class="watch-session-timer" id="sessionTimer" title="Tempo nesta sessao">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
          <span id="sessionTimerText">00:00</span>
        </div>
        <button class="btn-fullscreen" id="btnFullscreen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          Tela Cheia
        </button>
      </div>
      <div class="watch-layout">
        <div class="watch-main">
          <div class="watch-player" id="watchPlayer"></div>
          <div class="watch-info">
            <h2 id="watchTitle"></h2>
            <div class="watch-meta">
              <span class="watch-subject" id="watchSubject"></span>
              <span class="watch-date" id="watchDate"></span>
            </div>
            <p class="watch-desc" id="watchDesc"></p>
          </div>
          <div class="comments-section">
            <h3>Comentarios</h3>
            <div class="comment-input-row">
              <input type="text" id="videoCommentInput" placeholder="Duvida ou comentario...">
              <button id="videoCommentBtn">Enviar</button>
            </div>
            <div id="videoCommentsList"></div>
          </div>
        </div>
        <div class="watch-notes-panel">
          <div class="notes-panel-header">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            <h3>Anotacoes</h3>
            <button class="btn-export-notes" id="btnExportNotes" title="Exportar anotacoes">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
          </div>
          <div class="note-input">
            <div class="note-editor-wrapper">
              <div class="note-toolbar" id="noteToolbar">
                <div class="note-toolbar-group">
                  <button class="note-toolbar-btn" data-command="bold" title="Negrito (Ctrl+B)"><strong>B</strong></button>
                  <button class="note-toolbar-btn" data-command="italic" title="Italico (Ctrl+I)"><em>I</em></button>
                  <button class="note-toolbar-btn" data-command="underline" title="Sublinhado (Ctrl+U)"><u>U</u></button>
                </div>
                <div class="note-toolbar-sep"></div>
                <div class="note-toolbar-group">
                  <button class="note-toolbar-btn" data-command="h1" title="Titulo Grande">H1</button>
                  <button class="note-toolbar-btn" data-command="h2" title="Titulo Medio">H2</button>
                  <button class="note-toolbar-btn" data-command="h3" title="Titulo Pequeno">H3</button>
                  <button class="note-toolbar-btn" data-command="p" title="Texto normal">P</button>
                </div>
                <div class="note-toolbar-sep"></div>
                <div class="note-toolbar-group">
                  <button class="note-toolbar-btn" data-command="justifyLeft" title="Alinhar esquerda">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
                  </button>
                  <button class="note-toolbar-btn" data-command="justifyCenter" title="Centralizar">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="10" x2="6" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="18" y1="18" x2="6" y2="18"/></svg>
                  </button>
                  <button class="note-toolbar-btn" data-command="justifyRight" title="Alinhar direita">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg>
                  </button>
                  <button class="note-toolbar-btn" data-command="justifyFull" title="Justificar">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="21" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="3" y2="18"/></svg>
                  </button>
                </div>
                <div class="note-toolbar-sep"></div>
                <div class="note-toolbar-group">
                  <button class="note-toolbar-btn" data-command="insertUnorderedList" title="Lista">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                  </button>
                  <button class="note-toolbar-btn" data-command="insertOrderedList" title="Lista numerada">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="2" y="8" font-size="7" fill="currentColor" stroke="none" font-weight="700">1</text><text x="2" y="14" font-size="7" fill="currentColor" stroke="none" font-weight="700">2</text><text x="2" y="20" font-size="7" fill="currentColor" stroke="none" font-weight="700">3</text></svg>
                  </button>
                </div>
                <div class="note-toolbar-sep"></div>
                <div class="note-toolbar-group">
                  <div class="note-color-wrapper">
                    <button class="note-toolbar-btn note-color-btn" data-command="foreColor" title="Cor do texto">
                      <span class="color-icon">A</span>
                    </button>
                    <input type="color" class="note-color-input" id="textColorPicker" value="#000000">
                  </div>
                  <div class="note-color-wrapper">
                    <button class="note-toolbar-btn note-color-btn" data-command="hiliteColor" title="Marca-texto">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    </button>
                    <input type="color" class="note-color-input" id="highlightColorPicker" value="#ffff00">
                  </div>
                </div>
              </div>
              <div class="note-editor" contenteditable="true" id="noteText" data-placeholder="Escreva uma anotacao..."></div>
              <button class="emoji-btn" data-emoji-target="noteText" title="Inserir emoji">&#128578;</button>
            </div>
            <button class="btn-note" id="btnAddNote" title="Salvar anotacao">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
          <div id="notesList" class="notes-list"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- MODAL ADICIONAR -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Adicionar Video</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form id="vidForm">
        <div class="form-group">
          <label for="vidTitle">Titulo *</label>
          <input type="text" id="vidTitle" placeholder="Ex: Aula sobre celulas" required>
        </div>
        <div class="form-group">
          <label for="vidSubject">Materia *</label>
          <select id="vidSubject" required>
            <option value="">Selecione a materia</option>
          </select>
        </div>
        <div class="form-group">
          <label for="vidUrl">Link do YouTube *</label>
          <input type="url" id="vidUrl" placeholder="https://www.youtube.com/watch?v=..." required>
        </div>
        <div class="form-group">
          <label for="vidDesc">Descricao</label>
          <div class="textarea-wrapper">
            <textarea id="vidDesc" rows="3" placeholder="Breve descricao do video..."></textarea>
            <button class="emoji-btn" data-emoji-target="vidDesc" title="Inserir emoji">&#128578;</button>
          </div>
        </div>
        <button type="submit" class="btn-submit">Salvar Video</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/database.js"></script>
  <script src="js/shared.js"></script>
  <script>
    (async function() {
      const root = document.getElementById('sidebarRoot');
      root.insertAdjacentHTML('afterbegin', renderSidebar('videos'));
      initSidebar();
      initEmojiPickers();

      const select = document.getElementById('vidSubject');
      Object.keys(SUBJECTS).forEach(k => {
        const o = document.createElement('option');
        o.value = k;
        o.textContent = SUBJECTS[k].name;
        select.appendChild(o);
      });

      let activeFilter = null;
      let currentVideoId = null;
      let ytPlayer = null;
      let ytReady = false;

      // Session timer
      let sessionTimerInterval = null;
      let sessionSeconds = 0;

      function startSessionTimer() {
        stopSessionTimer();
        sessionSeconds = 0;
        updateSessionDisplay();
        sessionTimerInterval = setInterval(() => {
          sessionSeconds++;
          updateSessionDisplay();
        }, 1000);
      }

      function stopSessionTimer() {
        if (sessionTimerInterval) {
          clearInterval(sessionTimerInterval);
          sessionTimerInterval = null;
        }
        return sessionSeconds;
      }

      function updateSessionDisplay() {
        const el = document.getElementById('sessionTimerText');
        if (!el) return;
        const m = Math.floor(sessionSeconds / 60);
        const s = sessionSeconds % 60;
        el.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
      }

      // --- Video watch time: Supabase + localStorage cache (per-user) ---
      const _userVideoTimeCache = {}; // in-memory cache, synced to localStorage
      let _debounceTimer = null;
      let _pendingFlush = false;

      function _videoTimeLSKey() {
        const user = getCurrentUser();
        return 'enem_video_time_' + (user ? user.id : 'anon');
      }

      async function loadVideoTimesFromDB() {
        const user = getCurrentUser();
        if (!user) return;
        // Try Supabase first
        const dbTimes = await getAllVideoTimesFromDB(user.id);
        if (Object.keys(dbTimes).length > 0) {
          Object.assign(_userVideoTimeCache, dbTimes);
          localStorage.setItem(_videoTimeLSKey(), JSON.stringify(_userVideoTimeCache));
        } else {
          // Fallback: load from localStorage
          try {
            const cached = JSON.parse(localStorage.getItem(_videoTimeLSKey()) || '{}');
            Object.assign(_userVideoTimeCache, cached);
          } catch { /* empty */ }
        }
      }

      function getVideoTimeSpent() {
        return { ..._userVideoTimeCache };
      }

      function saveVideoTimeSpent(videoId, seconds) {
        if (!videoId || seconds <= 0) return;
        _userVideoTimeCache[videoId] = (_userVideoTimeCache[videoId] || 0) + seconds;
        localStorage.setItem(_videoTimeLSKey(), JSON.stringify(_userVideoTimeCache));
        _scheduleSupabaseFlush();
      }

      function _scheduleSupabaseFlush() {
        if (_debounceTimer) return; // already scheduled
        _pendingFlush = true;
        _debounceTimer = setTimeout(() => {
          _debounceTimer = null;
          _flushToSupabase();
        }, 30000); // 30s debounce
      }

      async function _flushToSupabase() {
        const user = getCurrentUser();
        if (!user) return;
        const keys = Object.keys(_userVideoTimeCache);
        for (const vidId of keys) {
          await saveVideoTimeToDB(user.id, vidId, _userVideoTimeCache[vidId]);
        }
      }

      async function _flushToSupabaseNow() {
        if (_debounceTimer) { clearTimeout(_debounceTimer); _debounceTimer = null; }
        await _flushToSupabase();
      }

      function formatTimeSpent(totalSec) {
        if (!totalSec) return null;
        if (totalSec < 60) return totalSec + 's';
        const h = Math.floor(totalSec / 3600);
        const m = Math.floor((totalSec % 3600) / 60);
        if (h > 0) return h + 'h' + m + 'min';
        return m + 'min';
      }

      // Load YouTube IFrame API
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
      window.onYouTubeIframeAPIReady = function() {
        ytReady = true;
      };

      function getCurrentVideoTime() {
        if (!ytPlayer) return null;
        try {
          return ytPlayer.getCurrentTime();
        } catch(e) {
          return null;
        }
      }

      const listView = document.getElementById('listView');
      const watchView = document.getElementById('watchView');

      async function showListView() {
        if (currentVideoId) {
          const elapsed = stopSessionTimer();
          if (elapsed > 0) saveVideoTimeSpent(currentVideoId, elapsed);
          await _flushToSupabaseNow();
        } else {
          stopSessionTimer();
        }
        listView.classList.remove('hidden');
        watchView.classList.add('hidden');
        document.querySelector('.sidebar').style.display = '';
        document.querySelector('.main').style.marginLeft = '';
        document.getElementById('watchPlayer').innerHTML = '';
        currentVideoId = null;
      }

      function showWatchView() {
        listView.classList.add('hidden');
        watchView.classList.remove('hidden');
        document.querySelector('.sidebar').style.display = 'none';
        document.querySelector('.main').style.marginLeft = '0';
      }

      async function renderVideos(filter) {
        activeFilter = filter || null;
        const allVids = await getVideos();
        const vids = allVids.filter(v => !activeFilter || v.subject === activeFilter);
        const list = document.getElementById('videoList');
        const empty = document.getElementById('emptyState');
        const timeSpent = getVideoTimeSpent();
        list.innerHTML = '';
        if (vids.length === 0) {
          empty.style.display = 'flex';
        } else {
          empty.style.display = 'none';
          vids.forEach((vid, idx) => {
            const s = SUBJECTS[vid.subject];
            const ytId = getYoutubeId(vid.url);
            const pinned = isPinned('video', vid.id);
            const timeEst = estimateTime('video', vid);
            const el = document.createElement('div');
            el.className = 'video-card';
            el.style.animationDelay = (idx * 0.06) + 's';
            el.dataset.searchText = (vid.title + ' ' + (vid.description || '') + ' ' + (s ? s.name : '')).toLowerCase();
            el.innerHTML = `
              <div class="video-thumb">
                ${ytId
                  ? `<img src="https://img.youtube.com/vi/${ytId}/mqdefault.jpg" alt="">`
                  : `<div class="thumb-placeholder"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23,7 16,12 23,17"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></div>`
                }
                <div class="play-overlay">
                  <div class="play-btn">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                  </div>
                </div>
              </div>
              <div class="video-info">
                <span class="video-subject">${s ? s.name : 'Geral'}</span>
                <h3>${vid.title}</h3>
                ${vid.description ? `<p>${vid.description}</p>` : ''}
                <div class="video-meta">
                  <span>${formatDate(vid.created_at)}</span>
                  <span class="meta-dot"></span>
                  <span>${(vid.notes || []).length} anotacao(oes)</span>
                  <span class="meta-dot"></span>
                  <span class="time-estimate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>~${timeEst} min</span>
                  ${timeSpent[vid.id] ? `<span class="meta-dot"></span><span class="time-spent-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>${formatTimeSpent(timeSpent[vid.id])} assistido</span>` : ''}
                </div>
              </div>
              <div class="video-actions">
                <button class="pin-btn ${pinned ? 'pinned' : ''}" data-id="${vid.id}" title="Fixar">${pinned ? '\u{1F4CC}' : '\u{1F4CE}'}</button>
                <button class="btn-icon btn-watch" title="Assistir">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,3 19,12 5,21"/></svg>
                </button>
                <button class="btn-icon btn-delete" title="Remover">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
              </div>
            `;
            el.querySelector('.btn-watch').addEventListener('click', () => watchVideo(vid));
            el.querySelector('.video-thumb').addEventListener('click', () => watchVideo(vid));
            el.querySelector('.btn-delete').addEventListener('click', async () => {
              if (confirm('Remover "' + vid.title + '"?')) {
                await removeVideo(vid.id);
                await renderVideos(activeFilter);
                await renderFilters();
                showToast('Video removido', 'success');
              }
            });
            el.querySelector('.pin-btn').addEventListener('click', (e) => {
              e.stopPropagation();
              const nowPinned = togglePin('video', vid.id);
              el.querySelector('.pin-btn').classList.toggle('pinned', nowPinned);
              el.querySelector('.pin-btn').textContent = nowPinned ? '\u{1F4CC}' : '\u{1F4CE}';
            });
            list.appendChild(el);
          });
        }
      }

      async function renderFilters() {
        const filters = document.getElementById('filters');
        const allVids = await getVideos();
        const subjects = [...new Set(allVids.map(v => v.subject))];
        filters.innerHTML = '';
        const allBtn = document.createElement('button');
        allBtn.className = 'filter-btn' + (!activeFilter ? ' active' : '');
        allBtn.textContent = 'Todos';
        allBtn.addEventListener('click', async () => { activeFilter = null; await renderVideos(null); await renderFilters(); });
        filters.appendChild(allBtn);
        subjects.forEach(sk => {
          const s = SUBJECTS[sk];
          const btn = document.createElement('button');
          btn.className = 'filter-btn' + (activeFilter === sk ? ' active' : '');
          btn.textContent = s ? s.name : sk;
          if (s) btn.style.setProperty('--f-color', s.color);
          btn.addEventListener('click', async () => { activeFilter = sk; await renderVideos(sk); await renderFilters(); });
          filters.appendChild(btn);
        });
      }

      async function renderVideoComments(videoId) {
        const comments = await getComments('video', videoId);
        const list = document.getElementById('videoCommentsList');
        list.innerHTML = '';
        if (comments.length === 0) {
          list.innerHTML = '<p class="no-comments">Nenhum comentario ainda. Seja o primeiro!</p>';
          return;
        }
        comments.forEach(c => {
          const el = document.createElement('div');
          el.className = 'comment-item';
          el.innerHTML = `
            <div class="comment-avatar">${(c.user_name || '?')[0].toUpperCase()}</div>
            <div class="comment-body">
              <div class="comment-meta"><strong>${c.user_name}</strong> ${formatDate(c.created_at)}</div>
              <div class="comment-text">${c.text}</div>
            </div>
          `;
          list.appendChild(el);
        });
      }

      function watchVideo(vid) {
        currentVideoId = vid.id;
        const s = SUBJECTS[vid.subject];
        document.getElementById('watchTitle').textContent = vid.title;
        const sub = document.getElementById('watchSubject');
        sub.textContent = s ? s.name : 'Geral';
        sub.style.color = s ? s.color : '';
        document.getElementById('watchDate').textContent = formatDate(vid.created_at);
        document.getElementById('watchDesc').textContent = vid.description || 'Sem descricao.';
        const ytId = getYoutubeId(vid.url);
        const playerEl = document.getElementById('watchPlayer');
        ytPlayer = null;
        if (ytId) {
          playerEl.innerHTML = `
            <div class="watch-embed">
              <div id="ytPlayerContainer"></div>
            </div>`;
          function createPlayer() {
            if (ytReady && window.YT && window.YT.Player) {
              ytPlayer = new YT.Player('ytPlayerContainer', {
                videoId: ytId,
                playerVars: { rel: 0, modestbranding: 1, origin: encodeURIComponent(window.location.origin) },
                events: { onReady: function(e) { ytPlayer = e.target; } }
              });
            } else {
              setTimeout(createPlayer, 200);
            }
          }
          createPlayer();
        } else {
          playerEl.innerHTML = `
            <div class="watch-embed" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text-dim);">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23,7 16,12 23,17"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
              <p>Link do YouTube invalido</p>
              <p style="font-size:11px;">Verifique se o link esta correto.</p>
            </div>`;
        }
        renderNotes(vid);
        renderVideoComments(vid.id);
        saveProgress('video', vid.id, { title: vid.title, subject: vid.subject });
        showWatchView();
        startSessionTimer();
      }

      async function renderNotes(vid) {
        const list = document.getElementById('notesList');
        list.innerHTML = '';
        const notes = vid.notes || [];
        if (notes.length === 0) {
          list.innerHTML = '<p class="no-notes">Nenhuma anotacao ainda.</p>';
          return;
        }
        notes.forEach((note, i) => {
          const el = document.createElement('div');
          el.className = 'note-item';
          const tsHtml = (note.timestamp !== undefined && note.timestamp !== null)
            ? `<button class="note-timestamp" data-time="${note.timestamp}" title="Pular para ${formatTimestamp(note.timestamp)}">${formatTimestamp(note.timestamp)}</button>`
            : '';
          el.innerHTML = `
            <div class="note-content">
              <div class="note-top-row">${tsHtml}</div>
              <div class="note-text">${sanitizeNoteHtml(note.text)}</div>
              <span class="note-date">${formatDate(note.created_at)}</span>
            </div>
            <button class="btn-icon btn-delete-note" title="Remover">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          `;
          const tsBtn = el.querySelector('.note-timestamp');
          if (tsBtn) {
            tsBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              const time = parseInt(tsBtn.dataset.time);
              if (ytPlayer && ytPlayer.seekTo) {
                ytPlayer.seekTo(time, true);
                ytPlayer.playVideo();
              }
            });
          }
          el.querySelector('.btn-delete-note').addEventListener('click', async () => {
            await removeNoteFromVideo(vid.id, i);
            const allVids = await getVideos();
            const updated = allVids.find(v => v.id === vid.id);
            renderNotes(updated);
            await renderVideos(activeFilter);
            showToast('Anotacao removida', 'success');
          });
          list.appendChild(el);
        });
      }

      function formatTimestamp(seconds) {
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return m + ':' + String(s).padStart(2, '0');
      }

      function sanitizeNoteHtml(html) {
        return html.replace(/<\/?script|<\/?iframe|<\/?object|<\/?embed|<\/?form/gi, '<!-- stripped -->');
      }

      function stripHtml(html) {
        const tmp = document.createElement('div');
        tmp.innerHTML = html;
        return tmp.textContent || tmp.innerText || '';
      }

      // Toolbar buttons
      function updateToolbarState() {
        document.querySelectorAll('.note-toolbar-btn').forEach(btn => {
          const cmd = btn.dataset.command;
          if (cmd === 'bold') btn.classList.toggle('active', document.queryCommandState('bold'));
          else if (cmd === 'italic') btn.classList.toggle('active', document.queryCommandState('italic'));
          else if (cmd === 'underline') btn.classList.toggle('active', document.queryCommandState('underline'));
          else if (cmd === 'insertUnorderedList') btn.classList.toggle('active', document.queryCommandState('insertUnorderedList'));
          else if (cmd === 'insertOrderedList') btn.classList.toggle('active', document.queryCommandState('insertOrderedList'));
          else if (cmd === 'justifyLeft') btn.classList.toggle('active', document.queryCommandValue('justifyContent') === 'start' || document.queryCommandValue('justifyAlignment') === 'left');
          else if (cmd === 'justifyCenter') btn.classList.toggle('active', document.queryCommandValue('justifyContent') === 'center');
          else if (cmd === 'justifyRight') btn.classList.toggle('active', document.queryCommandValue('justifyContent') === 'end' || document.queryCommandValue('justifyAlignment') === 'right');
          else if (cmd === 'justifyFull') btn.classList.toggle('active', document.queryCommandValue('justifyContent') === 'justify');
        });
      }

      document.querySelectorAll('.note-toolbar-btn[data-command]').forEach(btn => {
        btn.addEventListener('mousedown', e => e.preventDefault());
        btn.addEventListener('click', () => {
          const cmd = btn.dataset.command;
          document.getElementById('noteText').focus();
          if (cmd === 'h1') {
            document.execCommand('formatBlock', false, 'h1');
          } else if (cmd === 'h2') {
            document.execCommand('formatBlock', false, 'h2');
          } else if (cmd === 'h3') {
            document.execCommand('formatBlock', false, 'h3');
          } else if (cmd === 'p') {
            document.execCommand('formatBlock', false, 'p');
          } else if (cmd === 'foreColor') {
            const color = document.getElementById('textColorPicker').value;
            document.execCommand('foreColor', false, color);
          } else if (cmd === 'hiliteColor') {
            const color = document.getElementById('highlightColorPicker').value;
            document.execCommand('hiliteColor', false, color);
          } else {
            document.execCommand(cmd, false, null);
          }
          updateToolbarState();
        });
      });

      document.getElementById('textColorPicker').addEventListener('input', e => {
        document.getElementById('noteText').focus();
        document.execCommand('foreColor', false, e.target.value);
      });

      document.getElementById('highlightColorPicker').addEventListener('input', e => {
        document.getElementById('noteText').focus();
        document.execCommand('hiliteColor', false, e.target.value);
      });

      document.getElementById('noteText').addEventListener('keyup', updateToolbarState);
      document.getElementById('noteText').addEventListener('mouseup', updateToolbarState);

      document.getElementById('btnBack').addEventListener('click', showListView);

      document.getElementById('btnFullscreen').addEventListener('click', () => {
        const player = document.querySelector('.watch-embed');
        if (player) {
          if (player.requestFullscreen) player.requestFullscreen();
          else if (player.webkitRequestFullscreen) player.webkitRequestFullscreen();
          else if (player.msRequestFullscreen) player.msRequestFullscreen();
        }
      });

      const overlay = document.getElementById('modalOverlay');
      document.getElementById('btnAdd').addEventListener('click', () => overlay.classList.add('show'));
      document.getElementById('modalClose').addEventListener('click', () => overlay.classList.remove('show'));
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('show'); });

      document.getElementById('btnAddNote').addEventListener('click', async () => {
        const editor = document.getElementById('noteText');
        const text = editor.innerHTML.trim();
        if (!text || text === '<br>' || text === '<div><br></div>' || !currentVideoId) return;
        const time = getCurrentVideoTime();
        await addNoteToVideo(currentVideoId, text, time);
        editor.innerHTML = '';
        const allVids = await getVideos();
        const vid = allVids.find(v => v.id === currentVideoId);
        renderNotes(vid);
        await renderVideos(activeFilter);
        recordActivity();
        showToast('Anotacao salva!' + (time !== null ? ' (' + formatTimestamp(time) + ')' : ''), 'success');
      });

      document.getElementById('videoCommentBtn').addEventListener('click', async () => {
        const input = document.getElementById('videoCommentInput');
        const text = input.value.trim();
        if (!text || !currentVideoId) return;
        const user = getCurrentUser();
        await addComment('video', currentVideoId, user.id, user.name, text);
        input.value = '';
        renderVideoComments(currentVideoId);
        showToast('Comentario enviado!', 'success');
      });

      document.getElementById('videoCommentInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('videoCommentBtn').click();
      });

      document.getElementById('btnExportNotes').addEventListener('click', async () => {
        if (!currentVideoId) return;
        const allVids = await getVideos();
        const vid = allVids.find(v => v.id === currentVideoId);
        if (!vid || !vid.notes || vid.notes.length === 0) {
          showToast('Nenhuma anotacao para exportar', 'info');
          return;
        }
        let txt = 'ANOTACOES - ' + vid.title + '\n';
        txt += '='.repeat(50) + '\n\n';
        vid.notes.forEach((n, i) => {
          txt += (n.timestamp !== undefined ? '[' + formatTimestamp(n.timestamp) + '] ' : '') + stripHtml(n.text) + '\n';
          txt += '   (' + new Date(n.created_at).toLocaleString('pt-BR') + ')\n\n';
        });
        txt += '\nExportado em: ' + new Date().toLocaleString('pt-BR');
        const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'anotacoes_' + vid.title.replace(/[^a-zA-Z0-9]/g, '_') + '.txt';
        a.click();
        URL.revokeObjectURL(a.href);
        showToast('Anotacoes exportadas!', 'success');
      });

      document.getElementById('vidForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const url = document.getElementById('vidUrl').value.trim();
        if (!getYoutubeId(url)) {
          showToast('Por favor, insira um link valido do YouTube.', 'error');
          return;
        }
        await addVideo({
          title: document.getElementById('vidTitle').value,
          subject: document.getElementById('vidSubject').value,
          url: url,
          description: document.getElementById('vidDesc').value,
          notes: []
        });
        overlay.classList.remove('show');
        this.reset();
        await renderVideos(activeFilter);
        await renderFilters();
        showToast('Video adicionado com sucesso!', 'success');
      });

      document.querySelector('.topbar').addEventListener('input', function(e) {
        if (e.target.id !== 'searchInput') return;
        const q = e.target.value.toLowerCase().trim();
        document.querySelectorAll('.video-card').forEach(c => {
          c.classList.remove('search-highlight', 'search-dimmed');
          if (q && c.dataset.searchText && c.dataset.searchText.includes(q)) {
            c.classList.add('search-highlight');
          } else if (q) {
            c.classList.add('search-dimmed');
          }
        });
      });

      // Save time on tab close
      window.addEventListener('beforeunload', () => {
        if (currentVideoId) {
          const elapsed = stopSessionTimer();
          if (elapsed > 0) saveVideoTimeSpent(currentVideoId, elapsed);
        }
        // Force sync to Supabase synchronously via sendBeacon fallback
        const user = getCurrentUser();
        if (user && Object.keys(_userVideoTimeCache).length > 0) {
          // Try to cancel debounce and flush
          if (_debounceTimer) { clearTimeout(_debounceTimer); _debounceTimer = null; }
          const keys = Object.keys(_userVideoTimeCache);
          for (const vidId of keys) {
            // Best-effort: fire-and-forget (page is closing)
            saveVideoTimeToDB(user.id, vidId, _userVideoTimeCache[vidId]);
          }
        }
      });

      await loadVideoTimesFromDB();
      await renderVideos(null);
      await renderFilters();
    })();
  </script>
</body>
</html>
