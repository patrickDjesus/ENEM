<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENEM - Videos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="videos.css">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="home.html" class="logo-link">
        <span class="logo">ENEM</span>
        <span class="logo-sub">Study</span>
      </a>
    </div>
    <nav class="nav">
      <a href="home.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        Inicio
      </a>
      <a href="documents.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Documentos
      </a>
      <a href="videos.html" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23,7 16,12 23,17"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        Videos
      </a>
      <a href="quizzes.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Quizzes
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle" id="themeToggle">
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <span>Tema</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </button>
      <div class="user">
        <div class="avatar">P</div>
        <div class="user-info">
          <span class="user-name">Patrick</span>
          <span class="user-role">Estudante</span>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Videos</h1>
        <p>Assista aulas e faca anotacoes diretamente aqui</p>
      </div>
      <button class="btn-primary" id="btnAdd">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Adicionar Video
      </button>
    </header>

    <div class="filters" id="filters"></div>

    <div id="videoList" class="video-list"></div>
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><polygon points="23,7 16,12 23,17"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      </div>
      <p>Nenhum video adicionado.</p>
      <p>Clique em "Adicionar Video" para colar um link do YouTube.</p>
    </div>
  </main>

  <!-- MODAL ADICIONAR -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Adicionar Video</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form id="vidForm">
        <div class="form-group">
          <label for="vidTitle">Titulo *</label>
          <input type="text" id="vidTitle" placeholder="Ex: Aula sobre celulas" required>
        </div>
        <div class="form-group">
          <label for="vidSubject">Materia *</label>
          <select id="vidSubject" required>
            <option value="">Selecione a materia</option>
          </select>
        </div>
        <div class="form-group">
          <label for="vidUrl">Link do YouTube *</label>
          <input type="url" id="vidUrl" placeholder="https://www.youtube.com/watch?v=..." required>
        </div>
        <div class="form-group">
          <label for="vidDesc">Descricao</label>
          <div class="textarea-wrapper">
            <textarea id="vidDesc" rows="3" placeholder="Breve descricao do video..."></textarea>
            <button class="emoji-btn" data-emoji-target="vidDesc" title="Inserir emoji">&#128578;</button>
          </div>
        </div>
        <button type="submit" class="btn-submit">Salvar Video</button>
      </form>
    </div>
  </div>

  <!-- MODAL ASSISTIR + ANOTACOES -->
  <div class="modal-overlay" id="watchOverlay">
    <div class="modal modal-watch">
      <div class="modal-header">
        <div>
          <h2 id="watchTitle"></h2>
          <span class="watch-subject" id="watchSubject"></span>
        </div>
        <button class="modal-close" id="watchClose">&times;</button>
      </div>
      <p class="watch-desc" id="watchDesc"></p>
      <div class="watch-player" id="watchPlayer"></div>

      <div class="notes-section">
        <h3>Anotacoes</h3>
        <div class="note-input">
          <div class="textarea-wrapper">
            <textarea id="noteText" rows="2" placeholder="Escreva uma anotacao sobre este video..."></textarea>
            <button class="emoji-btn" data-emoji-target="noteText" title="Inserir emoji">&#128578;</button>
          </div>
          <button class="btn-note" id="btnAddNote">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div id="notesList" class="notes-list"></div>
      </div>
    </div>
  </div>

  <script src="database.js"></script>
  <script>
    const select = document.getElementById('vidSubject');
    Object.keys(SUBJECTS).forEach(k => {
      const o = document.createElement('option');
      o.value = k;
      o.textContent = SUBJECTS[k].name;
      select.appendChild(o);
    });

    let activeFilter = null;
    let currentVideoId = null;

    function renderVideos(filter) {
      activeFilter = filter || null;
      const vids = getDB('videos').filter(v => !activeFilter || v.subject === activeFilter);
      const list = document.getElementById('videoList');
      const empty = document.getElementById('emptyState');
      list.innerHTML = '';
      if (vids.length === 0) {
        empty.style.display = 'flex';
      } else {
        empty.style.display = 'none';
        vids.forEach(vid => {
          const s = SUBJECTS[vid.subject];
          const ytId = getYoutubeId(vid.url);
          const el = document.createElement('div');
          el.className = 'video-card';
          el.style.setProperty('--subject-color', s ? s.color : '#666');
          el.innerHTML = `
            <div class="video-thumb">
              ${ytId
                ? `<img src="https://img.youtube.com/vi/${ytId}/mqdefault.jpg" alt="">`
                : `<div class="thumb-placeholder"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23,7 16,12 23,17"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></div>`
              }
              <div class="play-overlay">
                <div class="play-btn">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                </div>
              </div>
            </div>
            <div class="video-info">
              <span class="video-subject" style="background:${s ? s.colorLight : 'var(--bg-input)'};color:${s ? s.color : 'var(--text-muted)'}">${s ? s.name : 'Geral'}</span>
              <h3>${vid.title}</h3>
              ${vid.description ? `<p>${vid.description}</p>` : ''}
              <div class="video-meta">
                <span>${formatDate(vid.createdAt)}</span>
                <span class="meta-dot"></span>
                <span>${(vid.notes || []).length} anotacao(oes)</span>
              </div>
            </div>
            <div class="video-actions">
              <button class="btn-icon btn-watch" title="Assistir">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,3 19,12 5,21"/></svg>
              </button>
              <button class="btn-icon btn-delete" title="Remover">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            </div>
          `;
          el.querySelector('.btn-watch').addEventListener('click', () => watchVideo(vid));
          el.querySelector('.video-thumb').addEventListener('click', () => watchVideo(vid));
          el.querySelector('.btn-delete').addEventListener('click', () => {
            if (confirm('Remover "' + vid.title + '"?')) {
              removeVideo(vid.id);
              renderVideos(activeFilter);
              renderFilters();
            }
          });
          list.appendChild(el);
        });
      }
    }

    function renderFilters() {
      const filters = document.getElementById('filters');
      const vids = getDB('videos');
      const subjects = [...new Set(vids.map(v => v.subject))];
      filters.innerHTML = '';
      const allBtn = document.createElement('button');
      allBtn.className = 'filter-btn' + (!activeFilter ? ' active' : '');
      allBtn.textContent = 'Todos';
      allBtn.addEventListener('click', () => { activeFilter = null; renderVideos(null); renderFilters(); });
      filters.appendChild(allBtn);
      subjects.forEach(sk => {
        const s = SUBJECTS[sk];
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (activeFilter === sk ? ' active' : '');
        btn.textContent = s ? s.name : sk;
        if (s) btn.style.setProperty('--f-color', s.color);
        btn.addEventListener('click', () => { activeFilter = sk; renderVideos(sk); renderFilters(); });
        filters.appendChild(btn);
      });
    }

    function watchVideo(vid) {
      currentVideoId = vid.id;
      const s = SUBJECTS[vid.subject];
      document.getElementById('watchTitle').textContent = vid.title;
      const sub = document.getElementById('watchSubject');
      sub.textContent = s ? s.name : 'Geral';
      sub.style.color = s ? s.color : '#666';
      document.getElementById('watchDesc').textContent = vid.description || '';
      const ytId = getYoutubeId(vid.url);
      document.getElementById('watchPlayer').innerHTML = ytId
        ? `<div class="watch-embed"><iframe src="https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen referrerpolicy="no-referrer"></iframe></div>`
        : '<p style="color:var(--text-dim);text-align:center;padding:40px;">Link do YouTube invalido</p>';
      renderNotes(vid);
      document.getElementById('watchOverlay').classList.add('show');
    }

    function renderNotes(vid) {
      const list = document.getElementById('notesList');
      list.innerHTML = '';
      const notes = vid.notes || [];
      if (notes.length === 0) {
        list.innerHTML = '<p class="no-notes">Nenhuma anotacao ainda.</p>';
        return;
      }
      notes.forEach((note, i) => {
        const el = document.createElement('div');
        el.className = 'note-item';
        el.innerHTML = `
          <div class="note-content">
            <p>${note.text}</p>
            <span class="note-date">${formatDate(note.createdAt)}</span>
          </div>
          <button class="btn-icon btn-delete-note" title="Remover">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        `;
        el.querySelector('.btn-delete-note').addEventListener('click', () => {
          removeNoteFromVideo(vid.id, i);
          const updated = getDB('videos').find(v => v.id === vid.id);
          renderNotes(updated);
          renderVideos(activeFilter);
        });
        list.appendChild(el);
      });
    }

    // Modals
    const overlay = document.getElementById('modalOverlay');
    document.getElementById('btnAdd').addEventListener('click', () => overlay.classList.add('show'));
    document.getElementById('modalClose').addEventListener('click', () => overlay.classList.remove('show'));
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('show'); });

    document.getElementById('watchClose').addEventListener('click', () => {
      document.getElementById('watchOverlay').classList.remove('show');
      document.getElementById('watchPlayer').innerHTML = '';
      currentVideoId = null;
    });
    document.getElementById('watchOverlay').addEventListener('click', e => {
      if (e.target.id === 'watchOverlay') {
        document.getElementById('watchOverlay').classList.remove('show');
        document.getElementById('watchPlayer').innerHTML = '';
        currentVideoId = null;
      }
    });

    // Add note
    document.getElementById('btnAddNote').addEventListener('click', () => {
      const text = document.getElementById('noteText').value.trim();
      if (!text || !currentVideoId) return;
      addNoteToVideo(currentVideoId, text);
      document.getElementById('noteText').value = '';
      const vid = getDB('videos').find(v => v.id === currentVideoId);
      renderNotes(vid);
      renderVideos(activeFilter);
    });

    document.getElementById('noteText').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        document.getElementById('btnAddNote').click();
      }
    });

    // Submit form
    document.getElementById('vidForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const url = document.getElementById('vidUrl').value.trim();
      if (!getYoutubeId(url)) {
        alert('Por favor, insira um link valido do YouTube.');
        return;
      }
      addVideo({
        title: document.getElementById('vidTitle').value,
        subject: document.getElementById('vidSubject').value,
        url: url,
        description: document.getElementById('vidDesc').value
      });
      overlay.classList.remove('show');
      this.reset();
      renderVideos(activeFilter);
      renderFilters();
    });

    renderVideos(null);
    renderFilters();
  </script>
  <script src="shared.js"></script>
</body>
</html>
