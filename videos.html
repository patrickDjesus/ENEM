<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENEM - Videos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/videos.css">
</head>
<body>

  <div id="sidebarRoot"></div>

  <main class="main">
    <!-- LIST VIEW -->
    <div id="listView">
      <header class="topbar">
        <div class="topbar-left">
          <h1>Videos</h1>
          <p>Assista aulas e faca anotacoes diretamente aqui</p>
        </div>
        <div class="topbar-right">
          <div class="search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Buscar videos..." id="searchInput">
          </div>
          <button class="btn-primary" id="btnAdd">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Adicionar Video
          </button>
        </div>
      </header>
      <div class="filters" id="filters"></div>
      <div id="videoList" class="video-list"></div>
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><polygon points="23,7 16,12 23,17"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        </div>
        <p>Nenhum video adicionado.</p>
        <p>Clique em "Adicionar Video" para colar um link do YouTube.</p>
      </div>
    </div>

    <!-- WATCH VIEW -->
    <div id="watchView" class="watch-view hidden">
      <div class="watch-topbar">
        <button class="btn-back-watch" id="btnBack">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Voltar
        </button>
        <button class="btn-fullscreen" id="btnFullscreen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          Tela Cheia
        </button>
      </div>
      <div class="watch-layout">
        <div class="watch-main">
          <div class="watch-player" id="watchPlayer"></div>
          <div class="watch-info">
            <h2 id="watchTitle"></h2>
            <div class="watch-meta">
              <span class="watch-subject" id="watchSubject"></span>
              <span class="watch-date" id="watchDate"></span>
            </div>
            <p class="watch-desc" id="watchDesc"></p>
          </div>
          <div class="comments-section">
            <h3>Comentarios</h3>
            <div class="comment-input-row">
              <input type="text" id="videoCommentInput" placeholder="Duvida ou comentario...">
              <button id="videoCommentBtn">Enviar</button>
            </div>
            <div id="videoCommentsList"></div>
          </div>
        </div>
        <div class="watch-notes-panel">
          <div class="notes-panel-header">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            <h3>Anotacoes</h3>
          </div>
          <div class="note-input">
            <div class="textarea-wrapper">
              <textarea id="noteText" rows="3" placeholder="Escreva uma anotacao sobre este video..."></textarea>
              <button class="emoji-btn" data-emoji-target="noteText" title="Inserir emoji">&#128578;</button>
            </div>
            <button class="btn-note" id="btnAddNote">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
          <div id="notesList" class="notes-list"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- MODAL ADICIONAR -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Adicionar Video</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form id="vidForm">
        <div class="form-group">
          <label for="vidTitle">Titulo *</label>
          <input type="text" id="vidTitle" placeholder="Ex: Aula sobre celulas" required>
        </div>
        <div class="form-group">
          <label for="vidSubject">Materia *</label>
          <select id="vidSubject" required>
            <option value="">Selecione a materia</option>
          </select>
        </div>
        <div class="form-group">
          <label for="vidUrl">Link do YouTube *</label>
          <input type="url" id="vidUrl" placeholder="https://www.youtube.com/watch?v=..." required>
        </div>
        <div class="form-group">
          <label for="vidDesc">Descricao</label>
          <div class="textarea-wrapper">
            <textarea id="vidDesc" rows="3" placeholder="Breve descricao do video..."></textarea>
            <button class="emoji-btn" data-emoji-target="vidDesc" title="Inserir emoji">&#128578;</button>
          </div>
        </div>
        <button type="submit" class="btn-submit">Salvar Video</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/database.js"></script>
  <script src="js/shared.js"></script>
  <script>
    (async function() {
      const root = document.getElementById('sidebarRoot');
      root.insertAdjacentHTML('afterbegin', renderSidebar('videos'));
      initSidebar();
      initThemeToggle();
      initEmojiPickers();

      const select = document.getElementById('vidSubject');
      Object.keys(SUBJECTS).forEach(k => {
        const o = document.createElement('option');
        o.value = k;
        o.textContent = SUBJECTS[k].name;
        select.appendChild(o);
      });

      let activeFilter = null;
      let currentVideoId = null;

      const listView = document.getElementById('listView');
      const watchView = document.getElementById('watchView');

      function showListView() {
        listView.classList.remove('hidden');
        watchView.classList.add('hidden');
        document.querySelector('.sidebar').style.display = '';
        document.querySelector('.main').style.marginLeft = '';
        document.getElementById('watchPlayer').innerHTML = '';
        currentVideoId = null;
        window.disableFocusMode();
      }

      function showWatchView() {
        listView.classList.add('hidden');
        watchView.classList.remove('hidden');
        document.querySelector('.sidebar').style.display = 'none';
        document.querySelector('.main').style.marginLeft = '0';
        if (window.enableFocusMode) window.enableFocusMode();
      }

      async function renderVideos(filter) {
        activeFilter = filter || null;
        const allVids = await getVideos();
        const vids = allVids.filter(v => !activeFilter || v.subject === activeFilter);
        const list = document.getElementById('videoList');
        const empty = document.getElementById('emptyState');
        list.innerHTML = '';
        if (vids.length === 0) {
          empty.style.display = 'flex';
        } else {
          empty.style.display = 'none';
          vids.forEach((vid, idx) => {
            const s = SUBJECTS[vid.subject];
            const ytId = getYoutubeId(vid.url);
            const pinned = isPinned('video', vid.id);
            const timeEst = estimateTime('video', vid);
            const el = document.createElement('div');
            el.className = 'video-card';
            el.style.animationDelay = (idx * 0.06) + 's';
            el.dataset.searchText = (vid.title + ' ' + (vid.description || '') + ' ' + (s ? s.name : '')).toLowerCase();
            el.innerHTML = `
              <div class="video-thumb">
                ${ytId
                  ? `<img src="https://img.youtube.com/vi/${ytId}/mqdefault.jpg" alt="">`
                  : `<div class="thumb-placeholder"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23,7 16,12 23,17"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></div>`
                }
                <div class="play-overlay">
                  <div class="play-btn">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                  </div>
                </div>
              </div>
              <div class="video-info">
                <span class="video-subject">${s ? s.name : 'Geral'}</span>
                <h3>${vid.title}</h3>
                ${vid.description ? `<p>${vid.description}</p>` : ''}
                <div class="video-meta">
                  <span>${formatDate(vid.created_at)}</span>
                  <span class="meta-dot"></span>
                  <span>${(vid.notes || []).length} anotacao(oes)</span>
                  <span class="meta-dot"></span>
                  <span class="time-estimate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>~${timeEst} min</span>
                </div>
              </div>
              <div class="video-actions">
                <button class="pin-btn ${pinned ? 'pinned' : ''}" data-id="${vid.id}" title="Fixar">${pinned ? '\u{1F4CC}' : '\u{1F4CE}'}</button>
                <button class="btn-icon btn-watch" title="Assistir">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,3 19,12 5,21"/></svg>
                </button>
                <button class="btn-icon btn-delete" title="Remover">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
              </div>
            `;
            el.querySelector('.btn-watch').addEventListener('click', () => watchVideo(vid));
            el.querySelector('.video-thumb').addEventListener('click', () => watchVideo(vid));
            el.querySelector('.btn-delete').addEventListener('click', async () => {
              if (confirm('Remover "' + vid.title + '"?')) {
                await removeVideo(vid.id);
                await renderVideos(activeFilter);
                await renderFilters();
                showToast('Video removido', 'success');
              }
            });
            el.querySelector('.pin-btn').addEventListener('click', (e) => {
              e.stopPropagation();
              const nowPinned = togglePin('video', vid.id);
              el.querySelector('.pin-btn').classList.toggle('pinned', nowPinned);
              el.querySelector('.pin-btn').textContent = nowPinned ? '\u{1F4CC}' : '\u{1F4CE}';
            });
            list.appendChild(el);
          });
        }
      }

      async function renderFilters() {
        const filters = document.getElementById('filters');
        const allVids = await getVideos();
        const subjects = [...new Set(allVids.map(v => v.subject))];
        filters.innerHTML = '';
        const allBtn = document.createElement('button');
        allBtn.className = 'filter-btn' + (!activeFilter ? ' active' : '');
        allBtn.textContent = 'Todos';
        allBtn.addEventListener('click', async () => { activeFilter = null; await renderVideos(null); await renderFilters(); });
        filters.appendChild(allBtn);
        subjects.forEach(sk => {
          const s = SUBJECTS[sk];
          const btn = document.createElement('button');
          btn.className = 'filter-btn' + (activeFilter === sk ? ' active' : '');
          btn.textContent = s ? s.name : sk;
          if (s) btn.style.setProperty('--f-color', s.color);
          btn.addEventListener('click', async () => { activeFilter = sk; await renderVideos(sk); await renderFilters(); });
          filters.appendChild(btn);
        });
      }

      async function renderVideoComments(videoId) {
        const comments = await getComments('video', videoId);
        const list = document.getElementById('videoCommentsList');
        list.innerHTML = '';
        if (comments.length === 0) {
          list.innerHTML = '<p class="no-comments">Nenhum comentario ainda. Seja o primeiro!</p>';
          return;
        }
        comments.forEach(c => {
          const el = document.createElement('div');
          el.className = 'comment-item';
          el.innerHTML = `
            <div class="comment-avatar">${(c.user_name || '?')[0].toUpperCase()}</div>
            <div class="comment-body">
              <div class="comment-meta"><strong>${c.user_name}</strong> ${formatDate(c.created_at)}</div>
              <div class="comment-text">${c.text}</div>
            </div>
          `;
          list.appendChild(el);
        });
      }

      function watchVideo(vid) {
        currentVideoId = vid.id;
        const s = SUBJECTS[vid.subject];
        document.getElementById('watchTitle').textContent = vid.title;
        const sub = document.getElementById('watchSubject');
        sub.textContent = s ? s.name : 'Geral';
        sub.style.color = s ? s.color : '';
        document.getElementById('watchDate').textContent = formatDate(vid.created_at);
        document.getElementById('watchDesc').textContent = vid.description || 'Sem descricao.';
        const ytId = getYoutubeId(vid.url);
        const playerEl = document.getElementById('watchPlayer');
        if (ytId) {
          playerEl.innerHTML = `
            <div class="watch-embed">
              <iframe
                src="https://www.youtube-nocookie.com/embed/${ytId}?rel=0&modestbranding=1&enablejsapi=1&origin=${encodeURIComponent(window.location.origin)}"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen
              ></iframe>
            </div>`;
        } else {
          playerEl.innerHTML = `
            <div class="watch-embed" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text-dim);">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23,7 16,12 23,17"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
              <p>Link do YouTube invalido</p>
              <p style="font-size:11px;">Verifique se o link esta correto.</p>
            </div>`;
        }
        renderNotes(vid);
        renderVideoComments(vid.id);
        saveProgress('video', vid.id, { title: vid.title, subject: vid.subject });
        showWatchView();
      }

      async function renderNotes(vid) {
        const list = document.getElementById('notesList');
        list.innerHTML = '';
        const notes = vid.notes || [];
        if (notes.length === 0) {
          list.innerHTML = '<p class="no-notes">Nenhuma anotacao ainda.</p>';
          return;
        }
        notes.forEach((note, i) => {
          const el = document.createElement('div');
          el.className = 'note-item';
          el.innerHTML = `
            <div class="note-content">
              <p>${note.text}</p>
              <span class="note-date">${formatDate(note.created_at)}</span>
            </div>
            <button class="btn-icon btn-delete-note" title="Remover">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          `;
          el.querySelector('.btn-delete-note').addEventListener('click', async () => {
            await removeNoteFromVideo(vid.id, i);
            const allVids = await getVideos();
            const updated = allVids.find(v => v.id === vid.id);
            renderNotes(updated);
            await renderVideos(activeFilter);
            showToast('Anotacao removida', 'success');
          });
          list.appendChild(el);
        });
      }

      document.getElementById('btnBack').addEventListener('click', showListView);

      document.getElementById('btnFullscreen').addEventListener('click', () => {
        const player = document.querySelector('.watch-embed');
        if (player) {
          if (player.requestFullscreen) player.requestFullscreen();
          else if (player.webkitRequestFullscreen) player.webkitRequestFullscreen();
          else if (player.msRequestFullscreen) player.msRequestFullscreen();
        }
      });

      const overlay = document.getElementById('modalOverlay');
      document.getElementById('btnAdd').addEventListener('click', () => overlay.classList.add('show'));
      document.getElementById('modalClose').addEventListener('click', () => overlay.classList.remove('show'));
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('show'); });

      document.getElementById('btnAddNote').addEventListener('click', async () => {
        const text = document.getElementById('noteText').value.trim();
        if (!text || !currentVideoId) return;
        await addNoteToVideo(currentVideoId, text);
        document.getElementById('noteText').value = '';
        const allVids = await getVideos();
        const vid = allVids.find(v => v.id === currentVideoId);
        renderNotes(vid);
        await renderVideos(activeFilter);
        showToast('Anotacao salva!', 'success');
      });

      document.getElementById('noteText').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          document.getElementById('btnAddNote').click();
        }
      });

      document.getElementById('videoCommentBtn').addEventListener('click', async () => {
        const input = document.getElementById('videoCommentInput');
        const text = input.value.trim();
        if (!text || !currentVideoId) return;
        const user = getCurrentUser();
        await addComment('video', currentVideoId, user.id, user.name, text);
        input.value = '';
        renderVideoComments(currentVideoId);
        showToast('Comentario enviado!', 'success');
      });

      document.getElementById('videoCommentInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('videoCommentBtn').click();
      });

      document.getElementById('vidForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const url = document.getElementById('vidUrl').value.trim();
        if (!getYoutubeId(url)) {
          showToast('Por favor, insira um link valido do YouTube.', 'error');
          return;
        }
        await addVideo({
          title: document.getElementById('vidTitle').value,
          subject: document.getElementById('vidSubject').value,
          url: url,
          description: document.getElementById('vidDesc').value,
          notes: []
        });
        overlay.classList.remove('show');
        this.reset();
        await renderVideos(activeFilter);
        await renderFilters();
        showToast('Video adicionado com sucesso!', 'success');
      });

      document.querySelector('.topbar').addEventListener('input', function(e) {
        if (e.target.id !== 'searchInput') return;
        const q = e.target.value.toLowerCase().trim();
        document.querySelectorAll('.video-card').forEach(c => {
          c.classList.remove('search-highlight', 'search-dimmed');
          if (q && c.dataset.searchText && c.dataset.searchText.includes(q)) {
            c.classList.add('search-highlight');
          } else if (q) {
            c.classList.add('search-dimmed');
          }
        });
      });

      await renderVideos(null);
      await renderFilters();
    })();
  </script>
</body>
</html>
