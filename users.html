  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="users.css">
</head>
<body>

        Inicio
      </a>
      <a href="documents.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Documentos
      </a>
      <a href="videos.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23,7 16,12 23,17"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        Videos
      </a>
      <a href="quizzes.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Quizzes

    <div class="sidebar-footer">
      <button class="theme-toggle" id="themeToggle">
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <span>Tema</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </button>
      <div class="user">
        <div class="avatar">P</div>
        <div class="user-info">
          <span class="user-name">Patrick</span>
          <span class="user-role">Estudante</span>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Usuarios</h1>
        <p>Gerencie os usuarios da plataforma</p>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary" id="btnAddUser">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Novo Usuario
        </button>
      </div>
    </header>

    <section class="users-grid" id="usersGrid"></section>

    <div id="emptyState" class="empty-state" style="display:none;">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <p>Nenhum usuario cadastrado</p>
    </div>

    <div id="userModal" class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modalTitle">Novo Usuario</h3>
          <button class="modal-close" id="modalClose">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <form id="userForm" onsubmit="return false;">
          <input type="hidden" id="editUserId">
          <div class="form-group">
            <label for="userName">Nome</label>
            <input type="text" id="userName" placeholder="Nome completo" required>
          </div>
          <div class="form-group">
            <label for="userEmail">E-mail</label>
            <input type="email" id="userEmail" placeholder="email@exemplo.com" required>
          </div>
          <div class="form-group">
            <label for="userPassword">Senha</label>
            <input type="password" id="userPassword" placeholder="Minimo 6 caracteres" required>
          </div>
          <div class="form-group">
            <label for="userRole">Perfil</label>
            <select id="userRole">
              <option value="user">Estudante</option>
              <option value="admin">Administrador</option>
            </select>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-ghost" id="modalCancel">Cancelar</button>
            <button type="submit" class="btn btn-primary" id="modalSave">Salvar</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="database.js"></script>
  <script>
    const grid = document.getElementById('usersGrid');
    const emptyState = document.getElementById('emptyState');
    const modal = document.getElementById('userModal');
    const modalTitle = document.getElementById('modalTitle');
    const userForm = document.getElementById('userForm');
    const editUserId = document.getElementById('editUserId');
    const userName = document.getElementById('userName');
    const userEmail = document.getElementById('userEmail');
    const userPassword = document.getElementById('userPassword');
    const userRole = document.getElementById('userRole');
    const currentUser = getCurrentUser();

    function renderUsers() {
      const users = getUsers();
      grid.innerHTML = '';
      if (users.length === 0) {
        emptyState.style.display = 'flex';
        return;
      }
      emptyState.style.display = 'none';
      users.forEach(u => {
        const initial = (u.name || '?')[0].toUpperCase();
        const roleLabel = u.role === 'admin' ? 'Admin' : 'Estudante';
        const roleClass = u.role === 'admin' ? 'role-admin' : 'role-user';
        const created = new Date(u.createdAt).toLocaleDateString('pt-BR');
        const canDelete = u.id !== 1 && u.id !== currentUser?.id;
        const card = document.createElement('div');
        card.className = 'user-card';
        card.innerHTML = `
          <div class="user-card-header">
            <div class="user-card-avatar">${initial}</div>
            <div class="user-card-info">
              <span class="user-card-name">${u.name}</span>
              <span class="user-card-role ${roleClass}">${roleLabel}</span>
            </div>
          </div>
          <div class="user-card-email">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            ${u.email}
          </div>
          <div class="user-card-footer">
            <span class="user-card-date">Criado em ${created}</span>
            <div class="user-card-actions">
              <button class="btn-icon" data-action="edit" data-id="${u.id}" title="Editar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              ${canDelete ? `<button class="btn-icon btn-icon-danger" data-action="delete" data-id="${u.id}" title="Excluir">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>` : ''}
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function openModal(user) {
      if (user) {
        modalTitle.textContent = 'Editar Usuario';
        editUserId.value = user.id;
        userName.value = user.name;
        userEmail.value = user.email;
        userPassword.value = '';
        userPassword.placeholder = 'Deixe vazio para manter';
        userPassword.required = false;
        userRole.value = user.role || 'user';
      } else {
        modalTitle.textContent = 'Novo Usuario';
        editUserId.value = '';
        userForm.reset();
        userPassword.placeholder = 'Minimo 6 caracteres';
        userPassword.required = true;
      }
      modal.classList.add('show');
    }

    function closeModal() {
      modal.classList.remove('show');
      userForm.reset();
      editUserId.value = '';
      userPassword.required = true;
      userPassword.placeholder = 'Minimo 6 caracteres';
    }

    document.getElementById('btnAddUser').addEventListener('click', () => openModal(null));
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    userForm.addEventListener('submit', () => {
      const name = userName.value.trim();
      const email = userEmail.value.trim();
      const password = userPassword.value;
      const role = userRole.value;
      const id = editUserId.value ? parseInt(editUserId.value) : null;

      if (!name || !email) return;
      if (!id && password.length < 6) { alert('A senha deve ter no minimo 6 caracteres.'); return; }

      if (id) {
        const data = { name, email, role };
        if (password) data.password = password;
        const ok = updateUser(id, data);
        if (!ok) { alert('E-mail ja esta em uso.'); return; }
      } else {
        const ok = addUser({ name, email, password, role });
        if (!ok) { alert('E-mail ja esta em uso.'); return; }
      }
      closeModal();
      renderUsers();
    });

    grid.addEventListener('click', e => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const id = parseInt(btn.dataset.id);
      if (btn.dataset.action === 'edit') {
        const user = getUsers().find(u => u.id === id);
        if (user) openModal(user);
      } else if (btn.dataset.action === 'delete') {
        if (confirm('Tem certeza que deseja excluir este usuario?')) {
          removeUser(id);
          renderUsers();
        }
      }
    });

    renderUsers();
  </script>
  <script src="shared.js"></script>
</body>
</html>
