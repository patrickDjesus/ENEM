<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENEM - Quizzes</title>
  <link rel="icon" href="img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/quizzes.css">
</head>
<body>

  <div id="sidebarRoot"></div>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Quizzes</h1>
        <p>Crie quizzes personalizados e teste seus conhecimentos</p>
      </div>
      <div class="topbar-right">
        <div class="search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Buscar quizzes..." id="searchInput">
        </div>
        <button class="btn-primary" id="btnCreate">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Criar Quiz
        </button>
      </div>
    </header>

    <div class="filters" id="filters"></div>

    <div id="quizList" class="quiz-list"></div>
    <div id="emptyState" class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <p>Nenhum quiz criado ainda.</p>
      <p>Clique em "Criar Quiz" para comecar.</p>
    </div>
  </main>

  <!-- MODAL CRIAR QUIZ -->
  <div class="modal-overlay" id="createOverlay">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h2>Criar Novo Quiz</h2>
        <button class="modal-close" id="createClose">&times;</button>
      </div>
      <form id="quizForm">
        <div class="form-row">
          <div class="form-group" style="flex:2">
            <label for="quizTitle">Titulo do Quiz *</label>
            <input type="text" id="quizTitle" placeholder="Ex: Era Vargas" required>
          </div>
          <div class="form-group" style="flex:1">
            <label for="quizSubject">Materia *</label>
            <select id="quizSubject" required>
              <option value="">Selecione</option>
            </select>
          </div>
          <div class="form-group" style="flex:1">
            <label for="quizDifficulty">Dificuldade</label>
            <select id="quizDifficulty">
              <option value="facil">Facil</option>
              <option value="medio" selected>Medio</option>
              <option value="dificil">Dificil</option>
            </select>
          </div>
        </div>

        <div class="questions-builder">
          <div class="questions-header">
            <h3>Questoes</h3>
            <span class="question-count" id="questionCount">0 questoes</span>
          </div>
          <div id="questionsList"></div>
          <div class="add-question-row">
            <button type="button" class="btn-add-question" id="btnAddMc">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Multipla Escolha
            </button>
            <button type="button" class="btn-add-question btn-add-written" id="btnAddWritten">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
              Resposta Escrita
            </button>
            <button type="button" class="btn-add-question btn-add-tf" id="btnAddTF">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
              Verdadeiro / Falso
            </button>
            <button type="button" class="btn-add-question btn-add-fill" id="btnAddFill">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="6" y1="12" x2="10" y2="12"/><line x1="14" y1="12" x2="18" y2="12"/></svg>
              Preencher Lacuna
            </button>
            <button type="button" class="btn-add-question btn-add-order" id="btnAddOrder">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              Ordenar Itens
            </button>
            <button type="button" class="btn-add-question btn-add-match" id="btnAddMatch">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
              Conectar Pares
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit">Salvar Quiz</button>
      </form>
    </div>
  </div>

  <!-- MODAL RESPONDER QUIZ -->
  <div class="modal-overlay" id="playOverlay">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div>
          <h2 id="playTitle"></h2>
          <span class="play-subject" id="playSubject"></span>
        </div>
        <button class="modal-close" id="playClose">&times;</button>
      </div>
      <div id="playContent"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/database.js"></script>
  <script src="js/shared.js"></script>
  <script>
    (async function() {
      const root = document.getElementById('sidebarRoot');
      root.insertAdjacentHTML('afterbegin', renderSidebar('quizzes'));
      initSidebar();
      initEmojiPickers();
      const select = document.getElementById('quizSubject');
      Object.keys(SUBJECTS).forEach(k => {
        const o = document.createElement('option');
        o.value = k;
        o.textContent = SUBJECTS[k].name;
        select.appendChild(o);
      });

      let activeFilter = null;
      let activeDifficulty = null;
      let questionIndex = 0;
      let quizKeyboardHandler = null;

      function _quizDraftKey(quizId, qIdx) {
        const user = getCurrentUser();
        return 'quiz_draft_' + quizId + '_' + qIdx + '_' + (user ? user.id : 'anon');
      }

      let confirmResolve = null;
      function showConfirm(text) {
        return new Promise(resolve => {
          confirmResolve = resolve;
          let overlay = document.getElementById('confirmOverlay');
          if (!overlay) {
            overlay = document.createElement('div');
            overlay.id = 'confirmOverlay';
            overlay.className = 'confirm-overlay';
            overlay.innerHTML = `<div class="confirm-box"><p>Voce selecionou:</p><div class="confirm-selected" id="confirmText"></div><div class="confirm-actions"><button class="confirm-no" id="confirmNo">Cancelar</button><button class="confirm-yes" id="confirmYes">Confirmar</button></div></div>`;
            document.body.appendChild(overlay);
            document.getElementById('confirmYes').addEventListener('click', () => { overlay.classList.remove('show'); confirmResolve(true); });
            document.getElementById('confirmNo').addEventListener('click', () => { overlay.classList.remove('show'); confirmResolve(false); });
            overlay.addEventListener('click', e => { if (e.target === overlay) { overlay.classList.remove('show'); confirmResolve(false); } });
          }
          document.getElementById('confirmText').textContent = text;
          overlay.classList.add('show');
        });
      }

      async function renderQuizzes(filter, diffFilter) {
        activeFilter = filter || null;
        activeDifficulty = diffFilter || null;
        const allQuizzes = await getQuizzes();
        const quizzes = allQuizzes.filter(q => {
          if (activeFilter && q.subject !== activeFilter) return false;
          if (activeDifficulty && (q.difficulty || 'medio') !== activeDifficulty) return false;
          return true;
        });
        const list = document.getElementById('quizList');
        const empty = document.getElementById('emptyState');
        list.innerHTML = '';
        if (quizzes.length === 0) {
          empty.style.display = 'flex';
        } else {
          empty.style.display = 'none';
          quizzes.forEach(q => {
            const s = SUBJECTS[q.subject];
            const pinned = isPinned('quiz', q.id);
            const timeEst = estimateTime('quiz', q);
            const el = document.createElement('div');
            el.className = 'quiz-card';
            el.dataset.searchText = (q.title + ' ' + (s ? s.name : '')).toLowerCase();
            el.innerHTML = `
              <div class="quiz-left">
                <div class="quiz-icon">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                </div>
                <div class="quiz-info">
                  <h3>${escapeHtml(q.title)}</h3>
                  <div class="quiz-meta">
                    <span class="quiz-subject-tag">${s ? s.name : 'Geral'}</span>
                    <span class="quiz-difficulty-tag diff-${q.difficulty || 'medio'}">${q.difficulty === 'facil' ? 'Facil' : q.difficulty === 'dificil' ? 'Dificil' : 'Medio'}</span>
                    <span class="quiz-count">${q.questions.length} questoes</span>
                    <span class="quiz-date">${formatDate(q.created_at)}</span>
                    <span class="time-estimate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>~${timeEst} min</span>
                  </div>
                </div>
              </div>
              <div class="quiz-actions">
                <button class="pin-btn ${pinned ? 'pinned' : ''}" data-id="${q.id}" title="Fixar">${pinned ? '\u{1F4CC}' : '\u{1F4CE}'}</button>
                <button class="btn-quiz btn-play" title="Iniciar Quiz">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,3 19,12 5,21"/></svg>
                  Jogar
                </button>
                <button class="btn-icon btn-delete-quiz" title="Remover">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
              </div>
            `;
            el.querySelector('.btn-play').addEventListener('click', () => playQuiz(q));
            el.querySelector('.btn-delete-quiz').addEventListener('click', async () => {
              if (await showConfirmModal('Remover quiz "' + q.title + '"?')) {
                await removeQuiz(q.id);
                await renderQuizzes(activeFilter, activeDifficulty);
                await renderFilters();
              }
            });
            el.querySelector('.pin-btn').addEventListener('click', (e) => {
              e.stopPropagation();
              const nowPinned = togglePin('quiz', q.id);
              el.querySelector('.pin-btn').classList.toggle('pinned', nowPinned);
              el.querySelector('.pin-btn').textContent = nowPinned ? '\u{1F4CC}' : '\u{1F4CE}';
            });
            list.appendChild(el);
          });
        }
      }

      async function renderFilters() {
        const filters = document.getElementById('filters');
        const allQuizzes = await getQuizzes();
        const subjects = [...new Set(allQuizzes.map(q => q.subject))];
        filters.innerHTML = '';
        const allBtn = document.createElement('button');
        allBtn.className = 'filter-btn' + (!activeFilter ? ' active' : '');
        allBtn.textContent = 'Todos';
        allBtn.addEventListener('click', async () => { activeFilter = null; await renderQuizzes(null, activeDifficulty); await renderFilters(); });
        filters.appendChild(allBtn);
        subjects.forEach(sk => {
          const s = SUBJECTS[sk];
          const btn = document.createElement('button');
          btn.className = 'filter-btn' + (activeFilter === sk ? ' active' : '');
          btn.textContent = s ? s.name : sk;
          if (s) btn.style.setProperty('--f-color', s.color);
          btn.addEventListener('click', async () => { activeFilter = sk; await renderQuizzes(sk, activeDifficulty); await renderFilters(); });
          filters.appendChild(btn);
        });
        const sep = document.createElement('span');
        sep.style.cssText = 'width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0;';
        filters.appendChild(sep);
        const diffLabels = { facil: 'Facil', medio: 'Medio', dificil: 'Dificil' };
        ['facil', 'medio', 'dificil'].forEach(d => {
          const btn = document.createElement('button');
          btn.className = 'filter-btn diff-filter-btn' + (activeDifficulty === d ? ' active' : '');
          btn.textContent = diffLabels[d];
          btn.dataset.diff = d;
          btn.addEventListener('click', async () => { activeDifficulty = activeDifficulty === d ? null : d; await renderQuizzes(activeFilter, activeDifficulty); await renderFilters(); });
          filters.appendChild(btn);
        });
      }

      function updateCount() {
        const count = document.querySelectorAll('.question-item').length;
        document.getElementById('questionCount').textContent = count + ' questao(oes)';
      }

      function addMcQuestion() {
        questionIndex++;
        const qNum = questionIndex;
        const container = document.getElementById('questionsList');
        const el = document.createElement('div');
        el.className = 'question-item';
        el.dataset.type = 'mc';
        el.innerHTML = `
          <div class="question-header">
            <span class="question-number">Questao ${qNum} <span class="q-type-badge">Multipla Escolha</span></span>
            <button type="button" class="btn-remove-question" title="Remover">&times;</button>
          </div>
          <div class="form-group">
            <label>Pergunta</label>
            <div class="textarea-wrapper">
              <textarea class="q-text" rows="2" placeholder="Digite a pergunta..." required></textarea>
            </div>
          </div>
          <div class="q-options">
            <label class="q-option"><input type="radio" name="correct_${qNum}" value="0" required><span class="option-letter">A</span><input type="text" class="option-input" placeholder="Alternativa A" required></label>
            <label class="q-option"><input type="radio" name="correct_${qNum}" value="1"><span class="option-letter">B</span><input type="text" class="option-input" placeholder="Alternativa B" required></label>
            <label class="q-option"><input type="radio" name="correct_${qNum}" value="2"><span class="option-letter">C</span><input type="text" class="option-input" placeholder="Alternativa C" required></label>
            <label class="q-option"><input type="radio" name="correct_${qNum}" value="3"><span class="option-letter">D</span><input type="text" class="option-input" placeholder="Alternativa D" required></label>
          </div>
          <p class="q-hint">Marque o botao ao lado da alternativa correta</p>
        `;
        el.querySelector('.btn-remove-question').addEventListener('click', () => { el.remove(); updateCount(); });
        container.appendChild(el);
        updateCount();
      }

      function addWrittenQuestion() {
        questionIndex++;
        const qNum = questionIndex;
        const container = document.getElementById('questionsList');
        const el = document.createElement('div');
        el.className = 'question-item question-written';
        el.dataset.type = 'written';
        el.innerHTML = `
          <div class="question-header">
            <span class="question-number">Questao ${qNum} <span class="q-type-badge badge-written">Resposta Escrita</span></span>
            <button type="button" class="btn-remove-question" title="Remover">&times;</button>
          </div>
          <div class="form-group">
            <label>Pergunta</label>
            <div class="textarea-wrapper">
              <textarea class="q-text" rows="2" placeholder="Digite a pergunta..." required></textarea>
            </div>
          </div>
          <div class="form-group" style="margin-top:12px">
            <label>Resposta correta (modelo)</label>
            <div class="textarea-wrapper">
              <textarea class="q-answer-key" rows="3" placeholder="Digite a resposta esperada para comparacao..." required></textarea>
            </div>
          </div>
          <p class="q-hint">Ao responder, o usuario vera sua resposta ao lado da resposta modelo para comparar.</p>
        `;
        el.querySelector('.btn-remove-question').addEventListener('click', () => { el.remove(); updateCount(); });
        container.appendChild(el);
        updateCount();
      }

      function addTrueFalseQuestion() {
        questionIndex++;
        const qNum = questionIndex;
        const container = document.getElementById('questionsList');
        const el = document.createElement('div');
        el.className = 'question-item question-tf';
        el.dataset.type = 'truefalse';
        el.innerHTML = `
          <div class="question-header">
            <span class="question-number">Questao ${qNum} <span class="q-type-badge badge-tf">Verdadeiro / Falso</span></span>
            <button type="button" class="btn-remove-question" title="Remover">&times;</button>
          </div>
          <div class="form-group">
            <label>Pergunta</label>
            <div class="textarea-wrapper">
              <textarea class="q-text" rows="2" placeholder="Ex: O Brasil foi descoberto em 1500." required></textarea>
            </div>
          </div>
          <div class="q-options">
            <label class="q-option"><input type="radio" name="tf_${qNum}" value="true" required><span class="option-letter" style="background:rgba(0,184,148,0.1);color:#00b894">V</span><span class="option-text">Verdadeiro</span></label>
            <label class="q-option"><input type="radio" name="tf_${qNum}" value="false"><span class="option-letter" style="background:rgba(225,112,85,0.1);color:#e17055">F</span><span class="option-text">Falso</span></label>
          </div>
          <p class="q-hint">Marque se a afirmacao e verdadeira ou falsa. Pontuacao Cebraspe: +1 acerto, -1 erro.</p>
        `;
        el.querySelector('.btn-remove-question').addEventListener('click', () => { el.remove(); updateCount(); });
        container.appendChild(el);
        updateCount();
      }

      function addFillBlankQuestion() {
        questionIndex++;
        const qNum = questionIndex;
        const container = document.getElementById('questionsList');
        const el = document.createElement('div');
        el.className = 'question-item question-fill';
        el.dataset.type = 'fillblank';
        el.innerHTML = `
          <div class="question-header">
            <span class="question-number">Questao ${qNum} <span class="q-type-badge badge-fill">Preencher Lacuna</span></span>
            <button type="button" class="btn-remove-question" title="Remover">&times;</button>
          </div>
          <div class="form-group">
            <label>Texto com lacuna</label>
            <div class="textarea-wrapper">
              <textarea class="q-text" rows="2" placeholder="Use ___ para marcar a lacuna. Ex: O maior planeta do sistema solar e ___." required></textarea>
            </div>
          </div>
          <div class="form-group" style="margin-top:12px">
            <label>Resposta correta</label>
            <input type="text" class="q-fill-answer" placeholder="Ex: Jupiter" required>
          </div>
          <p class="q-hint">Use tres underscores (___) no texto para indicar onde o aluno deve preencher.</p>
        `;
        el.querySelector('.btn-remove-question').addEventListener('click', () => { el.remove(); updateCount(); });
        container.appendChild(el);
        updateCount();
      }

      function addOrderingQuestion() {
        questionIndex++;
        const qNum = questionIndex;
        const container = document.getElementById('questionsList');
        const el = document.createElement('div');
        el.className = 'question-item question-order';
        el.dataset.type = 'ordering';
        el.innerHTML = `
          <div class="question-header">
            <span class="question-number">Questao ${qNum} <span class="q-type-badge badge-order">Ordenar Itens</span></span>
            <button type="button" class="btn-remove-question" title="Remover">&times;</button>
          </div>
          <div class="form-group">
            <label>Instrucao</label>
            <div class="textarea-wrapper">
              <textarea class="q-text" rows="2" placeholder="Ex: Coloque os eventos em ordem cronologica." required></textarea>
            </div>
          </div>
          <div class="form-group">
            <label>Itens (na ordem CORRETA, de cima para baixo)</label>
            <div class="order-items-list" data-qnum="${qNum}"></div>
            <button type="button" class="btn-add-order-item" data-qnum="${qNum}">+ Adicionar Item</button>
          </div>
          <p class="q-hint">Adicione os itens na ordem correta. Eles serao embaralhados durante o quiz.</p>
        `;
        el.querySelector('.btn-remove-question').addEventListener('click', () => { el.remove(); updateCount(); });
        container.appendChild(el);

        const list = el.querySelector('.order-items-list');
        let orderItemCount = 0;
        function addOrderItem() {
          orderItemCount++;
          const item = document.createElement('div');
          item.className = 'order-item-row';
          item.innerHTML = `
            <span class="order-grip" title="Arrastar">&#9776;</span>
            <input type="text" class="order-item-input option-input" placeholder="Item ${orderItemCount}" required>
            <button type="button" class="btn-remove-order-item" title="Remover">&times;</button>
          `;
          item.querySelector('.btn-remove-order-item').addEventListener('click', () => { item.remove(); });
          list.appendChild(item);
        }
        addOrderItem();
        addOrderItem();
        addOrderItem();
        el.querySelector('.btn-add-order-item').addEventListener('click', addOrderItem);
        updateCount();
      }

      function addMatchingQuestion() {
        questionIndex++;
        const qNum = questionIndex;
        const container = document.getElementById('questionsList');
        const el = document.createElement('div');
        el.className = 'question-item question-match';
        el.dataset.type = 'matching';
        el.innerHTML = `
          <div class="question-header">
            <span class="question-number">Questao ${qNum} <span class="q-type-badge badge-match">Conectar Pares</span></span>
            <button type="button" class="btn-remove-question" title="Remover">&times;</button>
          </div>
          <div class="form-group">
            <label>Instrucao</label>
            <div class="textarea-wrapper">
              <textarea class="q-text" rows="2" placeholder="Ex: Conecte cada conceito com sua definicao." required></textarea>
            </div>
          </div>
          <div class="form-group">
            <label>Pares (esquerda = direita)</label>
            <div class="match-pairs-list" data-qnum="${qNum}"></div>
            <button type="button" class="btn-add-match-pair" data-qnum="${qNum}">+ Adicionar Par</button>
          </div>
          <p class="q-hint">Cada linha define um par correto. Durante o quiz, os itens da direita serao embaralhados.</p>
        `;
        el.querySelector('.btn-remove-question').addEventListener('click', () => { el.remove(); updateCount(); });
        container.appendChild(el);

        const list = el.querySelector('.match-pairs-list');
        let pairCount = 0;
        function addMatchPair() {
          pairCount++;
          const pair = document.createElement('div');
          pair.className = 'match-pair-row';
          pair.innerHTML = `
            <input type="text" class="match-left-input option-input" placeholder="Esquerda ${pairCount}" required>
            <span class="match-arrow">&harr;</span>
            <input type="text" class="match-right-input option-input" placeholder="Direita ${pairCount}" required>
            <button type="button" class="btn-remove-match-pair" title="Remover">&times;</button>
          `;
          pair.querySelector('.btn-remove-match-pair').addEventListener('click', () => { pair.remove(); });
          list.appendChild(pair);
        }
        addMatchPair();
        addMatchPair();
        addMatchPair();
        el.querySelector('.btn-add-match-pair').addEventListener('click', addMatchPair);
        updateCount();
      }

      document.getElementById('btnAddMc').addEventListener('click', addMcQuestion);
      document.getElementById('btnAddWritten').addEventListener('click', addWrittenQuestion);
      document.getElementById('btnAddTF').addEventListener('click', addTrueFalseQuestion);
      document.getElementById('btnAddFill').addEventListener('click', addFillBlankQuestion);
      document.getElementById('btnAddOrder').addEventListener('click', addOrderingQuestion);
      document.getElementById('btnAddMatch').addEventListener('click', addMatchingQuestion);

      document.getElementById('quizForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const items = document.querySelectorAll('.question-item');
        if (items.length === 0) { alert('Adicione pelo menos uma questao.'); return; }
        const questions = [];
        for (const item of items) {
          const text = item.querySelector('.q-text').value.trim();
          if (!text) { alert('Preencha todas as perguntas.'); return; }
          const type = item.dataset.type;
          if (type === 'written') {
            const answer = item.querySelector('.q-answer-key').value.trim();
            if (!answer) { alert('Preencha a resposta modelo.'); return; }
            questions.push({ type: 'written', text, answer });
          } else if (type === 'truefalse') {
            const correct = item.querySelector('input[type="radio"]:checked');
            if (!correct) { alert('Marque a resposta correta (V/F).'); return; }
            questions.push({ type: 'truefalse', text, correct: correct.value === 'true' });
          } else if (type === 'fillblank') {
            const answer = item.querySelector('.q-fill-answer').value.trim();
            if (!answer) { alert('Preencha a resposta correta.'); return; }
            if (!text.includes('___')) { alert('Use ___ no texto para marcar a lacuna.'); return; }
            questions.push({ type: 'fillblank', text, answer });
          } else if (type === 'ordering') {
            const inputs = item.querySelectorAll('.order-item-input');
            const itemsList = Array.from(inputs).map(i => i.value.trim()).filter(v => v);
            if (itemsList.length < 2) { alert('Adicione pelo menos 2 itens para ordenacao.'); return; }
            questions.push({ type: 'ordering', text, items: itemsList });
          } else if (type === 'matching') {
            const pairs = [];
            item.querySelectorAll('.match-pair-row').forEach(row => {
              const l = row.querySelector('.match-left-input').value.trim();
              const r = row.querySelector('.match-right-input').value.trim();
              if (l && r) pairs.push([l, r]);
            });
            if (pairs.length < 2) { alert('Adicione pelo menos 2 pares.'); return; }
            questions.push({ type: 'matching', text, pairs });
          } else {
            const opts = item.querySelectorAll('.option-input');
            const correct = item.querySelector('input[type="radio"]:checked');
            if (opts.length < 4 || !correct) { alert('Preencha todas as alternativas e marque a correta.'); return; }
            questions.push({ type: 'mc', text, options: Array.from(opts).map(o => o.value.trim()), correct: parseInt(correct.value) });
          }
        }
        await addQuiz({ title: document.getElementById('quizTitle').value, subject: document.getElementById('quizSubject').value, difficulty: document.getElementById('quizDifficulty').value, questions });
        document.getElementById('createOverlay').classList.remove('show');
        this.reset();
        document.getElementById('questionsList').innerHTML = '';
        questionIndex = 0;
        updateCount();
        await renderQuizzes(activeFilter, activeDifficulty);
        await renderFilters();
      });

      function playQuiz(quiz) {
        const s = SUBJECTS[quiz.subject];
        document.getElementById('playTitle').textContent = quiz.title;
        const sub = document.getElementById('playSubject');
        sub.textContent = s ? s.name : 'Geral';
        sub.style.color = '';

        // Shuffle questions and track correct answers
        const shuffledQuestions = quiz.questions.map((q, origIdx) => {
          if (q.type === 'mc') {
            const indices = q.options.map((_, i) => i);
            const shuffledIndices = shuffleArray(indices);
            const newCorrect = shuffledIndices.indexOf(q.correct);
            return {
              ...q,
              _origIdx: origIdx,
              options: shuffledIndices.map(i => q.options[i]),
              correct: newCorrect,
              _origCorrect: q.correct
            };
          } else if (q.type === 'ordering') {
            const indices = q.items.map((_, i) => i);
            const shuffledIndices = shuffleArray(indices);
            return {
              ...q,
              _origIdx: origIdx,
              _shuffledItems: shuffledIndices.map(i => q.items[i]),
              _correctOrder: q.items
            };
          } else if (q.type === 'matching') {
            const rightIndices = q.pairs.map((_, i) => i);
            const shuffledRight = shuffleArray(rightIndices);
            return {
              ...q,
              _origIdx: origIdx,
              _shuffledRight: shuffledRight.map(i => q.pairs[i][1]),
              _correctPairs: q.pairs
            };
          }
          return { ...q, _origIdx: origIdx };
        });
        const shuffled = shuffleArray(shuffledQuestions);

        let current = 0;
        let score = 0;
        const answers = [];
        let selectedIndex = -1;

        // Timer
        let timerSeconds = 0;
        let timerInterval = null;
        let timerPaused = false;

        function startTimer() {
          if (timerInterval) clearInterval(timerInterval);
          timerInterval = setInterval(() => {
            if (!timerPaused) {
              timerSeconds++;
              const el = document.getElementById('quizTimer');
              if (el) el.textContent = formatTimer(timerSeconds);
            }
          }, 1000);
        }

        function formatTimer(secs) {
          const m = Math.floor(secs / 60);
          const s = secs % 60;
          return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }

        function stopTimer() {
          if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        }

        function renderTimerHtml() {
          return `
            <div class="quiz-timer-row">
              <span class="quiz-timer" id="quizTimer">00:00</span>
              <button class="quiz-timer-btn" id="btnPauseTimer" title="Pausar">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
              </button>
            </div>
          `;
        }

        startTimer();

        function renderQuestion() {
          if (current >= shuffled.length) { stopTimer(); showResult(); return; }
          const q = shuffled[current];
          const pct = ((current) / shuffled.length * 100).toFixed(0);
          selectedIndex = -1;

          if (q.type === 'written') {
            const savedDraft = localStorage.getItem(_quizDraftKey(quiz.id, q._origIdx)) || '';
            document.getElementById('playContent').innerHTML = `
              ${renderTimerHtml()}
              <div class="play-progress-bar"><div class="play-progress" style="width:${pct}%"></div></div>
              <div class="play-counter">Questao ${current + 1} de ${shuffled.length} <span class="q-type-badge badge-written">Escrita</span></div>
              <p class="play-question">${escapeHtml(q.text)}</p>
              <textarea id="writtenAnswer" class="written-input" rows="4" placeholder="Digite sua resposta aqui...">${escapeHtml(savedDraft)}</textarea>
              <button class="btn-submit" id="btnCheckWritten" style="margin-top:12px">Verificar Resposta</button>
              <div id="writtenComparison" style="display:none"></div>
            `;
            document.getElementById('writtenAnswer').addEventListener('input', function() {
              localStorage.setItem(_quizDraftKey(quiz.id, q._origIdx), this.value);
            });
            document.getElementById('btnCheckWritten').addEventListener('click', () => {
              const userAnswer = document.getElementById('writtenAnswer').value.trim();
              if (!userAnswer) { alert('Digite uma resposta.'); return; }
              localStorage.removeItem(_quizDraftKey(quiz.id, q._origIdx));
              document.getElementById('btnCheckWritten').style.display = 'none';
              document.getElementById('writtenAnswer').disabled = true;
              const comp = document.getElementById('writtenComparison');
              comp.style.display = 'block';
              comp.innerHTML = `
                <div class="written-comparison">
                  <div class="wc-box wc-yours"><span class="wc-label">Sua resposta</span><p>${escapeHtml(userAnswer)}</p></div>
                  <div class="wc-box wc-model"><span class="wc-label">Resposta modelo</span><p>${escapeHtml(q.answer)}</p></div>
                </div>
                <p class="wc-hint">Compare as respostas e avalie se acertou.</p>
                <div class="wc-eval">
                  <button class="btn-eval btn-correct" id="btnEvalCorrect">Acertei</button>
                  <button class="btn-eval btn-wrong" id="btnEvalWrong">Errei</button>
                </div>
              `;
              document.getElementById('btnEvalCorrect').addEventListener('click', () => {
                score++;
                answers.push({ question: current, userAnswer, correctAnswer: q.answer, isCorrect: true, type: 'written', text: q.text });
                recordActivity();
                setTimeout(() => { current++; renderQuestion(); }, 300);
              });
              document.getElementById('btnEvalWrong').addEventListener('click', () => {
                answers.push({ question: current, userAnswer, correctAnswer: q.answer, isCorrect: false, type: 'written', text: q.text });
                recordActivity();
                setTimeout(() => { current++; renderQuestion(); }, 300);
              });
            });
          } else if (q.type === 'truefalse') {
            document.getElementById('playContent').innerHTML = `
              ${renderTimerHtml()}
              <div class="play-progress-bar"><div class="play-progress" style="width:${pct}%"></div></div>
              <div class="play-counter">Questao ${current + 1} de ${shuffled.length} <span class="q-type-badge badge-tf">V/F</span></div>
              <p class="play-question">${escapeHtml(q.text)}</p>
              <div class="play-options play-tf-options">
                <button class="play-option play-tf-btn play-tf-true" data-value="true">
                  <span class="option-letter" style="background:rgba(0,184,148,0.1);color:#00b894">V</span>
                  <span class="option-text">Verdadeiro</span>
                </button>
                <button class="play-option play-tf-btn play-tf-false" data-value="false">
                  <span class="option-letter" style="background:rgba(225,112,85,0.1);color:#e17055">F</span>
                  <span class="option-text">Falso</span>
                </button>
              </div>
            `;
            const pauseBtn = document.getElementById('btnPauseTimer');
            if (pauseBtn) {
              pauseBtn.addEventListener('click', () => {
                timerPaused = !timerPaused;
                pauseBtn.innerHTML = timerPaused
                  ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,3 19,12 5,21"/></svg>'
                  : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
                pauseBtn.title = timerPaused ? 'Continuar' : 'Pausar';
              });
            }
            const tfBtns = document.querySelectorAll('.play-tf-btn');
            let selectedTF = null;
            tfBtns.forEach(btn => {
              btn.addEventListener('click', async () => {
                const val = btn.dataset.value;
                const label = val === 'true' ? 'Verdadeiro' : 'Falso';
                const confirmed = await showConfirm(label);
                if (!confirmed) return;
                const isCorrect = (val === 'true') === q.correct;
                if (isCorrect) score++;
                answers.push({ question: current, selected: val, isCorrect, type: 'truefalse', text: q.text, correct: q.correct });
                recordActivity();
                tfBtns.forEach(b => {
                  b.disabled = true;
                  if (b.dataset.value === (q.correct ? 'true' : 'false')) b.classList.add('correct');
                  else if (b === btn && !isCorrect) b.classList.add('wrong', 'shake');
                });
                setTimeout(() => { current++; renderQuestion(); }, 800);
              });
            });
            if (quizKeyboardHandler) document.removeEventListener('keydown', quizKeyboardHandler);
            quizKeyboardHandler = function(e) {
              if (document.querySelector('.confirm-overlay.show')) return;
              if (['v','V','1','ArrowUp','ArrowLeft','w','W'].includes(e.key)) {
                e.preventDefault();
                tfBtns[0].click();
              } else if (['f','F','2','ArrowDown','ArrowRight','s','S'].includes(e.key)) {
                e.preventDefault();
                tfBtns[1].click();
              }
            };
            document.addEventListener('keydown', quizKeyboardHandler);
          } else if (q.type === 'fillblank') {
            const savedDraft = localStorage.getItem(_quizDraftKey(quiz.id, q._origIdx)) || '';
            document.getElementById('playContent').innerHTML = `
              ${renderTimerHtml()}
              <div class="play-progress-bar"><div class="play-progress" style="width:${pct}%"></div></div>
              <div class="play-counter">Questao ${current + 1} de ${shuffled.length} <span class="q-type-badge badge-fill">Lacuna</span></div>
              <p class="play-question">${escapeHtml(q.text).replace(/___/g, '<span class="fill-blank-marker">___</span>')}</p>
              <div class="fill-input-wrapper">
                <label class="fill-label">Sua resposta:</label>
                <input type="text" class="fill-blank-input" id="fillAnswer" placeholder="Digite a palavra que preenche a lacuna..." value="${escapeHtml(savedDraft)}" autocomplete="off">
              </div>
              <button class="btn-submit" id="btnCheckFill" style="margin-top:12px">Verificar</button>
            `;
            document.getElementById('fillAnswer').addEventListener('input', function() {
              localStorage.setItem(_quizDraftKey(quiz.id, q._origIdx), this.value);
            });
            document.getElementById('btnCheckFill').addEventListener('click', () => {
              const userAnswer = document.getElementById('fillAnswer').value.trim();
              if (!userAnswer) { alert('Digite uma resposta.'); return; }
              localStorage.removeItem(_quizDraftKey(quiz.id, q._origIdx));
              document.getElementById('btnCheckFill').style.display = 'none';
              document.getElementById('fillAnswer').disabled = true;
              const isCorrect = userAnswer.toLowerCase() === q.answer.toLowerCase();
              if (isCorrect) score++;
              answers.push({ question: current, userAnswer, correctAnswer: q.answer, isCorrect, type: 'fillblank', text: q.text });
              recordActivity();
              const wrapper = document.querySelector('.fill-input-wrapper');
              wrapper.innerHTML += `
                <div class="fill-result ${isCorrect ? 'fill-correct' : 'fill-wrong'}">
                  <span>${isCorrect ? '\u2713 Correto!' : '\u2717 Incorreto'}</span>
                  ${!isCorrect ? '<span class="fill-correct-answer">Resposta: ' + escapeHtml(q.answer) + '</span>' : ''}
                </div>
              `;
              setTimeout(() => { current++; renderQuestion(); }, 1200);
            });
            if (quizKeyboardHandler) document.removeEventListener('keydown', quizKeyboardHandler);
            quizKeyboardHandler = function(e) {
              if (e.key === 'Enter' && !document.querySelector('.confirm-overlay.show')) {
                const btn = document.getElementById('btnCheckFill');
                if (btn) btn.click();
              }
            };
            document.addEventListener('keydown', quizKeyboardHandler);
          } else if (q.type === 'ordering') {
            const items = [...q._shuffledItems];
            let selectedOrderIdx = -1;
            document.getElementById('playContent').innerHTML = `
              ${renderTimerHtml()}
              <div class="play-progress-bar"><div class="play-progress" style="width:${pct}%"></div></div>
              <div class="play-counter">Questao ${current + 1} de ${shuffled.length} <span class="q-type-badge badge-order">Ordenacao</span></div>
              <p class="play-question">${escapeHtml(q.text)}</p>
              <p class="play-hint">Arraste os itens ou use os botoes para colocar na ordem correta.</p>
              <div class="order-play-list" id="orderPlayList"></div>
              <button class="btn-submit" id="btnSubmitOrder" style="margin-top:14px">Confirmar Ordem</button>
            `;
            const listEl = document.getElementById('orderPlayList');
            function renderOrderItems() {
              listEl.innerHTML = items.map((item, i) => `
                <div class="order-play-item ${selectedOrderIdx === i ? 'order-selected' : ''}" data-idx="${i}" draggable="true">
                  <span class="order-play-num">${i + 1}</span>
                  <span class="order-play-text">${escapeHtml(item)}</span>
                  <div class="order-play-arrows">
                    <button type="button" class="order-arrow-btn order-up" data-idx="${i}" ${i === 0 ? 'disabled' : ''}>&#9650;</button>
                    <button type="button" class="order-arrow-btn order-down" data-idx="${i}" ${i === items.length - 1 ? 'disabled' : ''}>&#9660;</button>
                  </div>
                </div>
              `).join('');
              listEl.querySelectorAll('.order-arrow-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                  e.stopPropagation();
                  const idx = parseInt(btn.dataset.idx);
                  if (btn.classList.contains('order-up') && idx > 0) {
                    [items[idx], items[idx - 1]] = [items[idx - 1], items[idx]];
                    renderOrderItems();
                  } else if (btn.classList.contains('order-down') && idx < items.length - 1) {
                    [items[idx], items[idx + 1]] = [items[idx + 1], items[idx]];
                    renderOrderItems();
                  }
                });
              });
              listEl.querySelectorAll('.order-play-item').forEach(el => {
                el.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', el.dataset.idx); el.classList.add('order-dragging'); });
                el.addEventListener('dragend', () => { el.classList.remove('order-dragging'); });
                el.addEventListener('dragover', (e) => { e.preventDefault(); el.classList.add('order-dragover'); });
                el.addEventListener('dragleave', () => { el.classList.remove('order-dragover'); });
                el.addEventListener('drop', (e) => {
                  e.preventDefault();
                  el.classList.remove('order-dragover');
                  const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
                  const toIdx = parseInt(el.dataset.idx);
                  if (fromIdx !== toIdx) {
                    const moved = items.splice(fromIdx, 1)[0];
                    items.splice(toIdx, 0, moved);
                    renderOrderItems();
                  }
                });
              });
            }
            renderOrderItems();
            let orderConfirmed = false;
            document.getElementById('pauseBtn') || null;
            const pauseBtn = document.getElementById('btnPauseTimer');
            if (pauseBtn) {
              pauseBtn.addEventListener('click', () => {
                timerPaused = !timerPaused;
                pauseBtn.innerHTML = timerPaused
                  ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,3 19,12 5,21"/></svg>'
                  : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
                pauseBtn.title = timerPaused ? 'Continuar' : 'Pausar';
              });
            }
            document.getElementById('btnSubmitOrder').addEventListener('click', async () => {
              if (orderConfirmed) return;
              const confirmed = await showConfirm('Confirmar esta ordem?');
              if (!confirmed) return;
              orderConfirmed = true;
              const isCorrect = items.every((item, i) => item === q._correctOrder[i]);
              if (isCorrect) score++;
              answers.push({ question: current, userOrder: [...items], correctOrder: q._correctOrder, isCorrect, type: 'ordering', text: q.text });
              recordActivity();
              document.getElementById('btnSubmitOrder').disabled = true;
              listEl.querySelectorAll('.order-play-item').forEach((el, i) => {
                if (items[i] === q._correctOrder[i]) el.classList.add('order-correct');
                else el.classList.add('order-wrong');
              });
              setTimeout(() => { current++; renderQuestion(); }, 1200);
            });
            if (quizKeyboardHandler) document.removeEventListener('keydown', quizKeyboardHandler);
            quizKeyboardHandler = function(e) {
              if (document.querySelector('.confirm-overlay.show') || orderConfirmed) return;
              if (e.key === 'Enter') {
                document.getElementById('btnSubmitOrder').click();
              }
            };
            document.addEventListener('keydown', quizKeyboardHandler);
          } else if (q.type === 'matching') {
            const leftItems = q._correctPairs.map(p => p[0]);
            const rightItems = [...q._shuffledRight];
            const userMatches = {};
            let selectedLeft = null;
            document.getElementById('playContent').innerHTML = `
              ${renderTimerHtml()}
              <div class="play-progress-bar"><div class="play-progress" style="width:${pct}%"></div></div>
              <div class="play-counter">Questao ${current + 1} de ${shuffled.length} <span class="q-type-badge badge-match">Conexao</span></div>
              <p class="play-question">${escapeHtml(q.text)}</p>
              <p class="play-hint">Clique em um item da esquerda, depois no par correspondente da direita.</p>
              <div class="match-play-grid" id="matchPlayGrid"></div>
              <button class="btn-submit" id="btnSubmitMatch" style="margin-top:14px">Confirmar Conexoes</button>
            `;
            const gridEl = document.getElementById('matchPlayGrid');
            function renderMatchItems() {
              gridEl.innerHTML = `
                <div class="match-play-col">
                  ${leftItems.map((item, i) => `
                    <div class="match-play-item match-left-item ${selectedLeft === i ? 'match-selected' : ''} ${userMatches[i] !== undefined ? 'match-paired' : ''}" data-side="left" data-idx="${i}">
                      <span class="match-play-text">${escapeHtml(item)}</span>
                      ${userMatches[i] !== undefined ? '<span class="match-play-arrow">&rarr;</span><span class="match-play-pair-text">' + escapeHtml(rightItems[userMatches[i]]) + '</span>' : ''}
                    </div>
                  `).join('')}
                </div>
                <div class="match-play-col">
                  ${rightItems.map((item, i) => {
                    const used = Object.values(userMatches).includes(i);
                    return `
                      <div class="match-play-item match-right-item ${used ? 'match-used' : ''}" data-side="right" data-idx="${i}">
                        <span class="match-play-text">${escapeHtml(item)}</span>
                      </div>
                    `;
                  }).join('')}
                </div>
              `;
              gridEl.querySelectorAll('.match-left-item').forEach(el => {
                el.addEventListener('click', () => {
                  if (el.classList.contains('match-paired')) {
                    const idx = parseInt(el.dataset.idx);
                    delete userMatches[idx];
                    selectedLeft = null;
                    renderMatchItems();
                    return;
                  }
                  selectedLeft = parseInt(el.dataset.idx);
                  renderMatchItems();
                });
              });
              gridEl.querySelectorAll('.match-right-item').forEach(el => {
                el.addEventListener('click', () => {
                  if (selectedLeft === null) return;
                  const rightIdx = parseInt(el.dataset.idx);
                  userMatches[selectedLeft] = rightIdx;
                  selectedLeft = null;
                  renderMatchItems();
                });
              });
            }
            renderMatchItems();
            const pauseBtn = document.getElementById('btnPauseTimer');
            if (pauseBtn) {
              pauseBtn.addEventListener('click', () => {
                timerPaused = !timerPaused;
                pauseBtn.innerHTML = timerPaused
                  ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,3 19,12 5,21"/></svg>'
                  : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
                pauseBtn.title = timerPaused ? 'Continuar' : 'Pausar';
              });
            }
            let matchConfirmed = false;
            document.getElementById('btnSubmitMatch').addEventListener('click', async () => {
              if (matchConfirmed) return;
              if (Object.keys(userMatches).length < leftItems.length) {
                alert('Conecte todos os pares antes de confirmar.');
                return;
              }
              const confirmed = await showConfirm('Confirmar estas conexoes?');
              if (!confirmed) return;
              matchConfirmed = true;
              let correctPairs = 0;
              leftItems.forEach((left, i) => {
                const expectedRight = q._correctPairs[i][1];
                const userRightIdx = userMatches[i];
                const userRight = rightItems[userRightIdx];
                const pairEl = gridEl.querySelector(`.match-left-item[data-idx="${i}"]`);
                if (userRight === expectedRight) {
                  correctPairs++;
                  if (pairEl) pairEl.classList.add('match-correct');
                } else {
                  if (pairEl) pairEl.classList.add('match-wrong');
                }
              });
              const totalPairs = leftItems.length;
              if (correctPairs === totalPairs) score++;
              answers.push({ question: current, userMatches: {...userMatches}, correctPairs: q._correctPairs, isCorrect: correctPairs === totalPairs, type: 'matching', text: q.text, totalPairs, correctCount: correctPairs });
              recordActivity();
              document.getElementById('btnSubmitMatch').disabled = true;
              setTimeout(() => { current++; renderQuestion(); }, 1500);
            });
            if (quizKeyboardHandler) document.removeEventListener('keydown', quizKeyboardHandler);
            quizKeyboardHandler = function(e) {
              if (document.querySelector('.confirm-overlay.show') || matchConfirmed) return;
              if (e.key === 'Enter') {
                document.getElementById('btnSubmitMatch').click();
              }
            };
            document.addEventListener('keydown', quizKeyboardHandler);
          } else {
            document.getElementById('playContent').innerHTML = `
              ${renderTimerHtml()}
              <div class="play-progress-bar"><div class="play-progress" style="width:${pct}%"></div></div>
              <div class="play-counter">Questao ${current + 1} de ${shuffled.length} <span style="font-size:11px;color:var(--text-ghost)">(Use setas/teclado ou clique)</span></div>
              <p class="play-question">${escapeHtml(q.text)}</p>
              <div class="play-options" id="playOptions">
                ${q.options.map((opt, i) => `
                  <button class="play-option" data-index="${i}">
                    <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                    <span class="option-text">${escapeHtml(opt)}</span>
                  </button>
                `).join('')}
              </div>
            `;
            const pauseBtn = document.getElementById('btnPauseTimer');
            if (pauseBtn) {
              pauseBtn.addEventListener('click', () => {
                timerPaused = !timerPaused;
                pauseBtn.innerHTML = timerPaused
                  ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,3 19,12 5,21"/></svg>'
                  : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
                pauseBtn.title = timerPaused ? 'Continuar' : 'Pausar';
              });
            }
            const options = document.querySelectorAll('.play-option');
            
            function selectOption(idx) {
              options.forEach(b => b.classList.remove('selected'));
              if (idx >= 0 && idx < options.length) {
                options[idx].classList.add('selected');
                selectedIndex = idx;
              }
            }

            options.forEach(btn => {
              btn.addEventListener('click', async () => {
                const idx = parseInt(btn.dataset.index);
                const optionText = q.options[idx];
                const confirmed = await showConfirm(String.fromCharCode(65 + idx) + ') ' + optionText);
                if (!confirmed) return;
                submitAnswer(idx);
              });
            });

            function submitAnswer(idx) {
              const isCorrect = idx === q.correct;
              if (isCorrect) score++;
              answers.push({ question: current, selected: idx, correct: q.correct, isCorrect, type: 'mc', text: q.text, options: q.options });
              recordActivity();
              options.forEach(b => {
                b.disabled = true;
                const bIdx = parseInt(b.dataset.index);
                if (bIdx === q.correct) b.classList.add('correct');
                else if (bIdx === idx && !isCorrect) {
                  b.classList.add('wrong', 'shake');
                }
              });
              setTimeout(() => { current++; renderQuestion(); }, 800);
            }

            if (quizKeyboardHandler) document.removeEventListener('keydown', quizKeyboardHandler);
            quizKeyboardHandler = function(e) {
              if (document.querySelector('.confirm-overlay.show')) return;
              const key = e.key;
              if (['ArrowDown', 'ArrowRight', 's', 'S'].includes(key)) {
                e.preventDefault();
                selectOption(Math.min(selectedIndex + 1, options.length - 1));
              } else if (['ArrowUp', 'ArrowLeft', 'w', 'W'].includes(key)) {
                e.preventDefault();
                selectOption(Math.max(selectedIndex - 1, 0));
              } else if (['1','2','3','4','a','b','c','d'].includes(key.toLowerCase())) {
                const map = {a:0,b:1,c:2,d:3,'1':0,'2':1,'3':2,'4':3};
                selectOption(map[key.toLowerCase()]);
              } else if (key === 'Enter' && selectedIndex >= 0) {
                options[selectedIndex].click();
              }
            };
            document.addEventListener('keydown', quizKeyboardHandler);
          }
        }

        function showResult() {
          if (quizKeyboardHandler) document.removeEventListener('keydown', quizKeyboardHandler);
          stopTimer();
          const pct = Math.round((score / shuffled.length) * 100);
          let msg = pct >= 80 ? 'Excelente!' : pct >= 50 ? 'Bom trabalho!' : 'Continue estudando!';

          const user = getCurrentUser();
          if (user) saveQuizResult(quiz.id, quiz.title, user.id, user.name, score, shuffled.length, quiz.subject);

          const wrongAnswers = answers.filter(a => !a.isCorrect);
          const timerStr = formatTimer(timerSeconds);

          document.getElementById('playContent').innerHTML = `
            <div class="result">
              <div class="result-circle"><span class="result-pct">${pct}%</span></div>
              <h3 class="result-msg">${msg}</h3>
              <p class="result-detail">${score} de ${shuffled.length} acertos &middot; Tempo: ${timerStr}</p>
              <div class="result-answers">
                ${answers.map((a, i) => `
                  <div class="result-answer ${a.isCorrect ? 'correct' : 'wrong'}">
                    <span class="ra-num">${i + 1}</span>
                    <span class="ra-icon">${a.isCorrect ? '\u2713' : '\u2717'}</span>
                  </div>
                `).join('')}
              </div>
              ${wrongAnswers.length > 0 ? `
                <div style="text-align:left;margin-top:20px;border-top:1px solid var(--border);padding-top:16px">
                  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                    <h3 style="font-size:15px;font-weight:700;color:var(--text-secondary)">Revisao dos Erros</h3>
                    <button class="btn-export-review" id="btnExportReview" title="Exportar revisao">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                      Exportar
                    </button>
                  </div>
                  ${wrongAnswers.map(a => `
                    <div class="review-item was-wrong">
                      <div class="review-question">${escapeHtml(a.text)}</div>
                      ${a.type === 'mc' ? `
                        <div class="review-your-answer">Sua resposta: ${String.fromCharCode(65 + a.selected)}) ${escapeHtml(a.options[a.selected])}</div>
                        <div class="review-correct-answer">Resposta correta: ${String.fromCharCode(65 + a.correct)}) ${escapeHtml(a.options[a.correct])}</div>
                      ` : a.type === 'truefalse' ? `
                        <div class="review-your-answer">Sua resposta: ${a.selected === 'true' ? 'Verdadeiro' : 'Falso'}</div>
                        <div class="review-correct-answer">Resposta correta: ${a.correct ? 'Verdadeiro' : 'Falso'}</div>
                      ` : a.type === 'fillblank' ? `
                        <div class="review-your-answer">Sua resposta: ${escapeHtml(a.userAnswer || '(vazio)')}</div>
                        <div class="review-correct-answer">Resposta correta: ${escapeHtml(a.correctAnswer)}</div>
                      ` : a.type === 'ordering' ? `
                        <div class="review-your-answer">Sua ordem: ${a.userOrder.map(i => escapeHtml(i)).join(' &rarr; ')}</div>
                        <div class="review-correct-answer">Ordem correta: ${a.correctOrder.map(i => escapeHtml(i)).join(' &rarr; ')}</div>
                      ` : a.type === 'matching' ? `
                        <div class="review-your-answer">Acertou ${a.correctCount} de ${a.totalPairs} pares</div>
                        <div class="review-correct-answer">Pares corretos: ${a.correctPairs.map(p => escapeHtml(p[0]) + ' &harr; ' + escapeHtml(p[1])).join(', ')}</div>
                      ` : `
                        <div class="review-your-answer">Sua resposta: ${escapeHtml(a.userAnswer || '(vazio)')}</div>
                        <div class="review-correct-answer">Resposta modelo: ${escapeHtml(a.correctAnswer)}</div>
                      `}
                    </div>
                  `).join('')}
                </div>
              ` : '<p style="color:#00b894;margin-top:12px;font-weight:600">Parabens! Todas as respostas estao corretas!</p>'}
              <button class="btn-submit result-btn" onclick="document.getElementById('playOverlay').classList.remove('show')">Fechar</button>
            </div>
          `;

          const exportBtn = document.getElementById('btnExportReview');
          if (exportBtn && wrongAnswers.length > 0) {
            exportBtn.addEventListener('click', () => {
              let txt = 'REVISAO DOS ERROS - ' + quiz.title + '\n';
              txt += '='.repeat(50) + '\n';
              txt += 'Acertos: ' + score + '/' + shuffled.length + ' (' + pct + '%)\n';
              txt += 'Tempo: ' + timerStr + '\n\n';
              wrongAnswers.forEach((a, i) => {
                txt += (i + 1) + '. ' + a.text + '\n';
                if (a.type === 'mc') {
                  txt += '   Sua resposta: ' + String.fromCharCode(65 + a.selected) + ') ' + a.options[a.selected] + '\n';
                  txt += '   Correta: ' + String.fromCharCode(65 + a.correct) + ') ' + a.options[a.correct] + '\n';
                } else if (a.type === 'truefalse') {
                  txt += '   Sua resposta: ' + (a.selected === 'true' ? 'Verdadeiro' : 'Falso') + '\n';
                  txt += '   Correta: ' + (a.correct ? 'Verdadeiro' : 'Falso') + '\n';
                } else if (a.type === 'fillblank') {
                  txt += '   Sua resposta: ' + (a.userAnswer || '(vazio)') + '\n';
                  txt += '   Correta: ' + a.correctAnswer + '\n';
                } else if (a.type === 'ordering') {
                  txt += '   Sua ordem: ' + a.userOrder.join(' -> ') + '\n';
                  txt += '   Correta: ' + a.correctOrder.join(' -> ') + '\n';
                } else if (a.type === 'matching') {
                  txt += '   Acertou ' + a.correctCount + ' de ' + a.totalPairs + ' pares\n';
                  txt += '   Pares corretos: ' + a.correctPairs.map(p => p[0] + ' <-> ' + p[1]).join(', ') + '\n';
                } else {
                  txt += '   Sua resposta: ' + (a.userAnswer || '(vazio)') + '\n';
                  txt += '   Modelo: ' + a.correctAnswer + '\n';
                }
                txt += '\n';
              });
              txt += 'Exportado em: ' + new Date().toLocaleString('pt-BR');
              const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
              const a = document.createElement('a');
              a.href = URL.createObjectURL(blob);
              a.download = 'revisao_' + quiz.title.replace(/[^a-zA-Z0-9]/g, '_') + '.txt';
              a.click();
              URL.revokeObjectURL(a.href);
              showToast('Revisao exportada!', 'success');
            });
          }
        }

        renderQuestion();
        document.getElementById('playOverlay').classList.add('show');
      }

      document.getElementById('btnCreate').addEventListener('click', () => document.getElementById('createOverlay').classList.add('show'));
      document.getElementById('createClose').addEventListener('click', () => document.getElementById('createOverlay').classList.remove('show'));
      document.getElementById('playClose').addEventListener('click', () => {
        document.getElementById('playOverlay').classList.remove('show');
        if (quizKeyboardHandler) { document.removeEventListener('keydown', quizKeyboardHandler); quizKeyboardHandler = null; }
      });
      document.getElementById('createOverlay').addEventListener('click', e => { if (e.target.id === 'createOverlay') e.target.classList.remove('show'); });
      document.getElementById('playOverlay').addEventListener('click', e => { if (e.target.id === 'playOverlay') { e.target.classList.remove('show'); if (quizKeyboardHandler) { document.removeEventListener('keydown', quizKeyboardHandler); quizKeyboardHandler = null; } } });

      const searchInput = document.querySelector('.topbar input[type="text"], #searchInput');
      if (searchInput) {
        searchInput.addEventListener('input', function() {
          const q = this.value.toLowerCase().trim();
          document.querySelectorAll('.quiz-card').forEach(c => {
            c.classList.remove('search-highlight', 'search-dimmed');
            if (q && c.dataset.searchText && c.dataset.searchText.includes(q)) c.classList.add('search-highlight');
            else if (q) c.classList.add('search-dimmed');
          });
        });
      }

      await renderQuizzes(null);
      await renderFilters();
    })();
  </script>
</body>
</html>
